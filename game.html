<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - Battle Royale</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }

        /* UI DE AVISOS */
        #ui-info { position: fixed; top: 10px; right: 10px; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 1px solid #0f0; z-index: 100; font-size: 14px; }
        #aviso-zona { position: fixed; top: 25%; left: 50%; transform: translateX(-50%); color: #ff0000; font-size: 2.5em; font-weight: bold; display: none; z-index: 100; text-shadow: 3px 3px #000; text-align: center; }
        #dash-count { position: fixed; bottom: 150px; right: 40px; color: #00ffff; font-size: 1.5em; font-weight: bold; text-shadow: 2px 2px #000; display: none; }

        /* PANTALLAS */
        .pantalla { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .form-container { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid #00ff00; width: 85%; max-width: 320px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #0f0; background: #222; color: #0f0; }
        button { width: 100%; padding: 12px; background: #00ff00; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }

        /* PANTALLA FINAL */
        #pantalla-fin { display: none; background: rgba(0,0,0,0.9); z-index: 10000; }
        #texto-puesto { font-size: 4em; color: #0f0; margin: 10px 0; }
        
        /* CONTROLES ANDROID */
        #ui-android { position: fixed; bottom: 0; left: 0; width: 100%; height: 200px; pointer-events: none; display: none; z-index: 10; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255,255,255,0.3); }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #0f0; border-radius: 50%; box-shadow: 0 0 15px #0f0; }
        #btn-dash { position: absolute; bottom: 60px; right: 40px; width: 85px; height: 85px; background: #0ff; border-radius: 50%; pointer-events: auto; border: 3px solid #fff; font-weight: bold; box-shadow: 0 0 20px #0ff; }
    
  .btn-animado {
    position: relative;
    width: 45%;
    display: inline-block;
    font-size: 0.8em;
    background: #0f0;
    color: black;
    border: none;
    padding: 10px;
    cursor: pointer;
    overflow: hidden; /* Para que el punto no se salga del botón */
  }

  /* El "puntito" que corre por el borde */
  .btn-animado::before {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    background: white; /* Color del puntito */
    border-radius: 50%;
    top: -10px; /* Escondido al inicio */
    left: -10px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* Animación al poner el mouse (hover) */
  .btn-animado:hover::before {
    opacity: 1;
    animation: correrContorno 1.5s linear infinite;
  }

  @keyframes correrContorno {
    0%   { top: 0; left: 0; }
    25%  { top: 0; left: 100%; transform: translateX(-100%); }
    50%  { top: 100%; left: 100%; transform: translate(-100%, -100%); }
    75%  { top: 100%; left: 0; transform: translateY(-100%); }
    100% { top: 0; left: 0; }
  }
        .modal-overlay {
    display: none; /* Escondido por defecto */
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 10000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #000;
    border: 2px solid #0f0;
    padding: 30px;
    text-align: center;
    box-shadow: 0 0 20px #0f0, inset 0 0 10px #0f0;
    font-family: 'Courier New', Courier, monospace;
    color: #0f0;
    max-width: 400px;
}

.canvas-container {
    width: 100px;
    height: 100px;
    margin: 0 auto 20px;
}

.modal-content h2 {
    text-shadow: 0 0 10px #0f0;
    letter-spacing: 2px;
}
</style>
</head>
<body>
   <div id="modal-neon" class="modal-overlay">
    <div class="modal-content">
        <div class="canvas-container">
            <canvas id="canvas-animacion"></canvas>
        </div>
        <h2>¡LISTO GUERRERO!</h2>
        <p>AHORA A LA BATALLA</p>
        <button onclick="cerrarModal()" class="btn-animado">ACEPTAR</button>
    </div>
</div> 
    <div id="ui-info">FASE: <span id="fase-val">1</span>/4 | CIERRE EN: <span id="timer-val">120</span>s</div>
    <div id="aviso-zona">¡FUERA DE LA ZONA!<br><span id="count-zona">5</span>s</div>
    <div id="dash-count">DASH: 0</div>

    <div id="pantalla-inicio" class="pantalla">
        <div class="form-container"> 
            <h1 style="color:#0f0; margin-bottom:10px;">SOLO UN PUNTO</h1>
            <div style="margin-bottom: 15px;">
               <button onclick="mostrarModo('login')" class="btn-animado">LOGIN</button>
               <button onclick="mostrarModo('registro')" class="btn-animado">REGISTRO</button>
            </div>
            <div id="form-login">
                <input type="email" id="l-email" placeholder="Correo">
                <input type="password" id="l-pass" placeholder="Contraseña">
                <button onclick="login()">ENTRAR</button>
            </div>
            <div id="form-registro" style="display:none;">
                <input type="text" id="r-user" placeholder="Nombre de Usuario">
                <input type="email" id="r-email" placeholder="Correo">
                <input type="password" id="r-pass" placeholder="Contraseña">
                <button onclick="registro()" style="background:#00ffff; color:#000;">CREAR CUENTA</button>
            </div>
            <p id="txt-sala" style="margin-top:15px; font-size:0.9em; color:#0f0;">Conectado al sistema</p>
            <button id="btn-start" style="display:none; background:#ff00ff;" onclick="socket.emit('solicitar_inicio_partida')">¡INICIAR PARTIDA!</button>
        </div>
    </div>

    <div id="pantalla-fin" class="pantalla">
        <div class="form-container" style="border-color: #ff00ff;">
            <h1 id="titulo-final">FIN DE LA PARTIDA</h1>
            <div id="texto-puesto">#1</div>
            <p id="subtexto-final">Cargando resultados...</p>
            <button onclick="location.reload()" style="background:#0ff; color:#000;">VOLVER AL INICIO</button>
        </div>
    </div>

    <div id="ui-android">
        <div id="joy-base"><div id="joy-stick"></div></div>
        <button id="btn-dash">DASH</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://server-solo-un-punto.onrender.com");
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player = { x: 2500, y: 2500, speed: 6, angle: 0, stretch: 1, anim: 0, vivo: true, hasWeapon: false, dashCharges: 0 };
let players = {}, items = [], walls = [], zona = { x:2500, y:2500, radio:2500 };
let juegoIniciado = false, joyX = 0, joyY = 0, teclas = {};
let fueraInterval = null;

if(/Android|iPhone/i.test(navigator.userAgent)) {
    document.getElementById('ui-android').style.display = 'block';
    document.getElementById('dash-count').style.display = 'block';
}
    
window.onkeydown = e => teclas[e.code] = true;
window.onkeyup = e => teclas[e.code] = false;

function login() { socket.emit('login_usuario', { email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value }); }

function mostrarModo(modo) {
    document.getElementById('form-login').style.display = modo === 'login' ? 'block' : 'none';
    document.getElementById('form-registro').style.display = modo === 'registro' ? 'block' : 'none';
}

function registro() {
    const datos = { username: document.getElementById('r-user').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value };
    if(!datos.username || !datos.email || !datos.password) return alert("Llena todos los campos");
    socket.emit('registrar_usuario', datos);
}
function abrirModal() {
    document.getElementById('modal-neon').style.display = 'flex';
    animarPuntos();
}

function cerrarModal() {
    document.getElementById('modal-neon').style.display = 'none';
    mostrarModo('login'); // Te manda al login después de aceptar
}

function animarPuntos() {
    const canvas = document.getElementById('canvas-animacion');
    const ctx = canvas.getContext('2d');
    let x = 0;

    function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Punto objetivo (rojo)
        ctx.fillStyle = 'red';
        ctx.beginPath(); ctx.arc(80, 50, 5, 0, Math.PI * 2); ctx.fill();
        
        // Punto guerrero (verde)
        ctx.fillStyle = '#0f0';
        ctx.beginPath(); ctx.arc(x, 50, 6, 0, Math.PI * 2); ctx.fill();
        
        if (x < 80) {
            x += 2;
            requestAnimationFrame(frame);
        } else {
            // Explosión simple al eliminar
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(80, 50, 15, 0, Math.PI * 2); ctx.fill();
        }
    }
    frame();
}
socket.on('registro_resultado', d => {
    if(d.exito) { abrirModal(); mostrarModo('login'); }
    else alert("Error: El usuario o correo ya existen.");
});

socket.on('actualizar_sala', d => {
    document.getElementById('txt-sala').innerText = `Jugadores en lobby: ${d.total}`;
    if(socket.id === d.hostId) document.getElementById('btn-start').style.display = 'block';
});

socket.on('iniciar_partida', d => {
    items = d.items; zona = d.zona; walls = d.walls || [];
    juegoIniciado = true;
    document.getElementById('pantalla-inicio').style.display = 'none';
});

socket.on('actualizar_zona', d => {
    zona = d.zona;
    document.getElementById('fase-val').innerText = d.fase;
    document.getElementById('timer-val').innerText = d.tiempo;
});

function handleInput() {
    if(!player.vivo) return;
    let dx = 0, dy = 0;
    if(teclas['ArrowUp'] || teclas['KeyW']) dy = -1;
    if(teclas['ArrowDown'] || teclas['KeyS']) dy = 1;
    if(teclas['ArrowLeft'] || teclas['KeyA']) dx = -1;
    if(teclas['ArrowRight'] || teclas['KeyD']) dx = 1;
    
    if(teclas['Space']) ejecutarDash();
    if(joyX !== 0 || joyY !== 0) { dx = joyX; dy = joyY; }

    if(dx !== 0 || dy !== 0) {
        let nextX = player.x + dx * player.speed;
        let nextY = player.y + dy * player.speed;
        let hitWall = false;
        walls.forEach(w => { if(nextX > w.x && nextX < w.x + w.w && nextY > w.y && nextY < w.y + w.h) hitWall = true; });

        if(!hitWall) {
            player.x = nextX; player.y = nextY;
            player.angle = Math.atan2(dy, dx);
            player.anim += 0.2;
            player.stretch = 1 + Math.abs(Math.sin(player.anim)) * 0.35;
        }
    } else { player.stretch = 1; }

    // Colisión con Items
    items.forEach(it => {
        if(Math.hypot(player.x - it.x, player.y - it.y) < 35) {
            if(it.type === 'weapon' && !player.hasWeapon) {
                player.hasWeapon = true;
                socket.emit('item_recogido', it.id);
            } else if(it.type === 'dash') {
                player.dashCharges = 5;
                document.getElementById('dash-count').innerText = `DASH: ${player.dashCharges}`;
                socket.emit('item_recogido', it.id);
            }
        }
    });

    // ATAQUE POR CONTACTO (Si tengo arma)
    if(player.hasWeapon) {
        for(let id in players) {
            if(id !== socket.id) {
                let p = players[id];
                if(Math.hypot(player.x - p.x, player.y - p.y) < 30) {
                    socket.emit('eliminar_jugador', id); // Enviamos señal al server para borrar al otro
                }
            }
        }
    }

    // Lógica Daño Zona
    const dist = Math.hypot(player.x - zona.x, player.y - zona.y);
    if(dist > zona.radio && player.vivo) {
        if(!fueraInterval) {
            let t = 5;
            document.getElementById('aviso-zona').style.display = 'block';
            fueraInterval = setInterval(() => {
                t--;
                document.getElementById('count-zona').innerText = t;
                if(t <= 0) { socket.emit('eliminar_jugador', socket.id); clearInterval(fueraInterval); }
            }, 1000);
        }
    } else {
        clearInterval(fueraInterval); fueraInterval = null;
        document.getElementById('aviso-zona').style.display = 'none';
    }
}

function ejecutarDash() {
    if(player.dashCharges > 0 && player.speed === 6) {
        player.speed = 22; player.dashCharges--;
        document.getElementById('dash-count').innerText = `DASH: ${player.dashCharges}`;
        setTimeout(() => player.speed = 6, 250);
    }
}

// JOYSTICK LÓGICA
const jBase = document.getElementById('joy-base'), jStick = document.getElementById('joy-stick');
jBase.ontouchmove = e => {
    const t = e.touches[0], r = jBase.getBoundingClientRect();
    let dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
    const d = Math.hypot(dx, dy); if(d > 45) { dx *= 45/d; dy *= 45/d; }
    jStick.style.transform = `translate(${dx}px, ${dy}px)`;
    joyX = dx/45; joyY = dy/45;
};
jBase.ontouchend = () => { jStick.style.transform = 'translate(0,0)'; joyX = 0; joyY = 0; };
document.getElementById('btn-dash').ontouchstart = (e) => { e.preventDefault(); ejecutarDash(); };

// PANTALLA FINAL RECIBIR
socket.on('has_muerto', (ranking) => {
    player.vivo = false;
    document.getElementById('pantalla-fin').style.display = 'flex';
    document.getElementById('titulo-final').innerText = "ELIMINADO";
    document.getElementById('titulo-final').style.color = "#ff0000";
    document.getElementById('texto-puesto').innerText = "#" + ranking;
    document.getElementById('subtexto-final').innerText = "Sigue practicando para ser el mejor.";
});

socket.on('eres_ganador', () => {
    document.getElementById('pantalla-fin').style.display = 'flex';
    document.getElementById('titulo-final').innerText = "¡ERES EL GANADOR DE SOLO UN PUNTO!";
    document.getElementById('titulo-final').style.color = "#00ff00";
    document.getElementById('texto-puesto').innerText = "#1";
    document.getElementById('subtexto-final').innerText = "Has derrotado a todos. ¡Felicidades!";
});

// --- NUEVAS VARIABLES DE EFECTOS ---
let particles = [];
let trails = {}; // Almacena las estelas de cada jugador

function createExplosion(x, y) {
    for(let i=0; i<15; i++) {
        particles.push({
            x, y, 
            vx: (Math.random()-0.5)*10, 
            vy: (Math.random()-0.5)*10, 
            life: 1.0, 
            color: '#0f0'
        });
    }
}

// --- ACTUALIZACIÓN DE LA FUNCIÓN DRAW ---
function draw() {
    if(juegoIniciado) handleInput();
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.fillStyle = '#050505'; // Fondo casi negro para que resalte el neón
    ctx.fillRect(0,0, canvas.width, canvas.height);
    
    if(!juegoIniciado) { requestAnimationFrame(draw); return; }

    ctx.save();
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

    // DIBUJAR ESTELAS (TRAILS)
    for(let id in trails) {
        ctx.beginPath();
        ctx.lineWidth = 10;
        ctx.strokeStyle = id === socket.id ? 'rgba(0, 255, 0, 0.2)' : 'rgba(255, 0, 0, 0.1)';
        trails[id].forEach((p, i) => {
            ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
        if(trails[id].length > 10) trails[id].shift(); // Limitar largo de estela
    }

    // DIBUJAR PARTICULAS
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.fillStyle = `rgba(0, 255, 0, ${p.life})`;
        ctx.fillRect(p.x, p.y, 4, 4);
        if(p.life <= 0) particles.splice(i, 1);
    });

    // MI JUGADOR CON GLOW (RESPLANDOR)
    if(player.vivo) {
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);
        
        // Sombra de neón
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.hasWeapon ? "#ff0000" : "#0f0";
        
        ctx.fillStyle = player.hasWeapon ? "#ff0000" : "#0f0";
        ctx.beginPath(); 
        ctx.ellipse(0, 0, 15*player.stretch, 13, 0, 0, Math.PI*2); 
        ctx.fill();

        if(player.hasWeapon) {
            // Arma estilo Sable Láser
            ctx.fillStyle = "#fff"; // Centro blanco
            ctx.fillRect(12, -4, 25, 8);
            ctx.strokeStyle = "#ff0000";
            ctx.lineWidth = 2;
            ctx.strokeRect(12, -4, 25, 8);
        }
        ctx.restore();
        
        // Actualizar mi estela local
        if(!trails[socket.id]) trails[socket.id] = [];
        trails[socket.id].push({x: player.x, y: player.y});
    }

    // ... (resto del dibujo de zona y muros con ctx.shadowBlur para el toque Next Gen)
    ctx.restore();
    requestAnimationFrame(draw);
}

// Escuchar explosiones del server
socket.on('efecto_explosion', d => createExplosion(d.x, d.y));

    // 1. Muros
    ctx.fillStyle = "#333"; walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

    // 2. Items
    items.forEach(it => {
        ctx.fillStyle = it.type === 'weapon' ? '#ff0000' : '#00ffff';
        ctx.fillRect(it.x, it.y, 22, 22);
    });

    // 3. Otros Jugadores
    for(let id in players) {
        let p = players[id];
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
        ctx.fillStyle = p.hasWeapon ? "#ff0000" : "#555";
        ctx.beginPath(); ctx.ellipse(0, 0, 15*(p.stretch||1), 13, 0, 0, Math.PI*2); ctx.fill();
        // Mostrar rectángulo si tiene arma
        if(p.hasWeapon) { ctx.fillStyle = "#ff0000"; ctx.fillRect(12, -6, 20, 12); }
        ctx.restore();
    }

    // 4. Mi Jugador
    if(player.vivo) {
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
        ctx.fillStyle = player.hasWeapon ? "#ff0000" : "#0f0";
        ctx.beginPath(); ctx.ellipse(0, 0, 15*player.stretch, 13, 0, 0, Math.PI*2); ctx.fill();
        // DIBUJAR ARMA (RECTÁNGULO)
        if(player.hasWeapon) {
            ctx.fillStyle = "#ff0000";
            ctx.fillRect(12, -6, 20, 12); // El rectángulo rojo pegado al punto
        }
        ctx.restore();
        socket.emit('move', { x: player.x, y: player.y, angle: player.angle, stretch: player.stretch, hasWeapon: player.hasWeapon });
    }

    // 5. Zona
    ctx.strokeStyle = "rgba(255, 0, 0, 0.5)"; ctx.lineWidth = 20;
    ctx.beginPath(); ctx.arc(zona.x, zona.y, zona.radio, 0, Math.PI*2); ctx.stroke();

    ctx.restore();
    requestAnimationFrame(draw);
}
draw();
socket.on('playerMoved', d => players[d.id] = d);
socket.on('playerDisconnected', id => delete players[id]);
socket.on('item_eliminado', id => items = items.filter(it => it.id !== id));
</script>
</body>
</html>
