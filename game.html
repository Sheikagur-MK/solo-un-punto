<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - HG NEON</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        .ui-layer { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .menu-box { background: rgba(0,20,0,0.9); border: 2px solid #0f0; padding: 30px; color: #0f0; pointer-events: auto; min-width: 300px; text-align: center; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 100%; margin: 10px 0; box-sizing: border-box; }
        button { background: #0f0; border: none; color: #000; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
        #game-ui { position: fixed; top: 20px; left: 20px; color: #0f0; z-index: 5; display: none; }
    </style>
</head>
<body>
    <div id="game-ui">ZONA ESTABLE</div>
    <div class="ui-layer" id="ui-container">
        <div class="menu-box" id="auth-box">
            <h1>SOLO UN PUNTO</h1>
            <input type="email" id="email" placeholder="CORREO">
            <input type="password" id="pass" placeholder="CONTRASEÑA">
            <button onclick="login()">CONECTAR</button>
        </div>
        <div class="menu-box" id="lobby-box" style="display:none;">
            <h2 id="user-tag">---</h2>
            <p id="status">ESPERANDO...</p>
            <button id="start-btn" style="display:none;" onclick="socket.emit('solicitar_inicio_partida')">INICIAR COMBATE</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://server-solo-un-punto.onrender.com");
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player = { x: 2500, y: 2500, vx: 0, vy: 0, r: 15 };
let players = {};
let walls = [];
let items = [];
let zona = { radio: 2500 };
let cam = { x: 2500, y: 2500 };
let iniciado = false;
const keys = {};

function login() {
    socket.emit('login_usuario', { 
        email: document.getElementById('email').value, 
        password: document.getElementById('pass').value 
    });
}

socket.on('login_resultado', d => {
    if(d.exito) {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('lobby-box').style.display = 'block';
        document.getElementById('user-tag').innerText = d.username;
    }
});

socket.on('actualizar_sala', d => {
    document.getElementById('status').innerText = `JUGADORES: ${d.total}`;
    document.getElementById('start-btn').style.display = (socket.id === d.hostId) ? 'block' : 'none';
});

socket.on('iniciar_partida', data => {
    walls = data.walls;
    items = data.items;
    zona = data.zona;
    iniciado = true;
    document.getElementById('ui-container').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
});

socket.on('playerMoved', d => players[d.id] = d);
socket.on('actualizar_zona', d => zona = d.zona);

function checkCollision(nx, ny) {
    for(let w of walls) {
        if(nx + player.r > w.x && nx - player.r < w.x + w.w && 
           ny + player.r > w.y && ny - player.r < w.y + w.h) return true;
    }
    return false;
}

function update() {
    if(!iniciado) return;

    const speed = 0.8;
    if(keys['w']) player.vy -= speed;
    if(keys['s']) player.vy += speed;
    if(keys['a']) player.vx -= speed;
    if(keys['d']) player.vx += speed;

    player.vx *= 0.9;
    player.vy *= 0.9;

    // Colisión simple con muros[cite: 8]
    if(!checkCollision(player.x + player.vx, player.y)) player.x += player.vx;
    if(!checkCollision(player.x, player.y + player.vy)) player.y += player.vy;

    cam.x += (player.x - cam.x) * 0.1;
    cam.y += (player.y - cam.y) * 0.1;

    socket.emit('move', { x: player.x, y: player.y });
}

function render() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    update();

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if(iniciado) {
        ctx.save();
        ctx.translate(canvas.width/2 - cam.x, canvas.height/2 - cam.y);

        // Cuadrícula
        ctx.strokeStyle = '#020';
        for(let i=0; i<=5000; i+=200) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,5000); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(5000,i); ctx.stroke();
        }

        // Muros con Brillo[cite: 8]
        walls.forEach(w => {
            ctx.shadowBlur = 10; ctx.shadowColor = '#0f0';
            ctx.fillStyle = '#050';
            ctx.fillRect(w.x, w.y, w.w, w.h);
            ctx.shadowBlur = 0;
        });

        // Otros Jugadores
        ctx.fillStyle = '#f00';
        for(let id in players) {
            ctx.beginPath(); ctx.arc(players[id].x, players[id].y, 15, 0, Math.PI*2); ctx.fill();
        }

        // Yo
        ctx.fillStyle = '#0f0';
        ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, Math.PI*2); ctx.fill();

        // Zona Prohibida
        ctx.strokeStyle = '#f00';
        ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(2500, 2500, zona.radio, 0, Math.PI*2); ctx.stroke();

        ctx.restore();
    }
    requestAnimationFrame(render);
}

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
render();
</script>
</body>
</html>
