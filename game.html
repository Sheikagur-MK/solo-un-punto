<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - HG Studios V2.0</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

        /* INTERFAZ */
        .pantalla { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(26,26,26,0.8) 0%, rgba(0,0,0,0.9) 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .form-container { background: rgba(15, 15, 15, 0.95); padding: 30px; border-radius: 20px; border: 2px solid #0f0; width: 85%; max-width: 450px; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); }
        
        .logo-hg { color: #f00; font-weight: bold; border: 1px solid #f00; padding: 2px 10px; font-size: 0.9em; margin-bottom: 10px; display: inline-block; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #0f0; background: #111; color: #0f0; outline: none; }
        button { cursor: pointer; border-radius: 8px; font-weight: bold; border: none; padding: 10px; margin: 5px; }

        /* MENÚ */
        #menu-principal { display: none; width: 100%; }
        .grid-opciones { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .opcion-card { background: #111; border: 2px solid #0f0; border-radius: 12px; padding: 15px; cursor: pointer; color: #fff; }
        .opcion-card:hover { background: #0f0; color: #000; }
        .full-width { grid-column: span 2; background: #0f0; color: #000; }
        .sub-menu { display: none; width: 100%; margin-top: 15px; }
        .stats-top { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; color: #0ff; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="pantalla-inicio" class="pantalla">
        <div class="form-container"> 
            <div class="logo-hg">HG STUDIOS V2.0</div>
            <h1 id="titulo-dinamico" style="color:#0f0; margin: 5px 0 10px;">SOLO UN PUNTO</h1>
            
            <div id="seccion-auth">
                <button onclick="mostrarModo('login')" style="background:#222; color:#0f0;">ENTRAR</button>
                <button onclick="mostrarModo('registro')" style="background:#222; color:#0f0;">REGISTRO</button>
                <div id="form-login">
                    <input type="email" id="l-email" placeholder="Correo">
                    <input type="password" id="l-pass" placeholder="Contraseña">
                    <button onclick="login()" style="width:100%; background:#0f0; color:#000;">ACCEDER</button>
                </div>
                <div id="form-registro" style="display:none;">
                    <input type="text" id="r-user" placeholder="Guerrero">
                    <input type="email" id="r-email" placeholder="Correo">
                    <input type="password" id="r-pass" placeholder="Contraseña">
                    <button onclick="registro()" style="width:100%; background:#00ffff; color:#000;">CREAR CUENTA</button>
                </div>
            </div>

            <div id="menu-principal">
                <div class="stats-top">
                    <span id="display-user">PLAYER</span>
                    <span>💰 <span id="val-monedas">0</span></span>
                    <span>🏆 <span id="val-victorias">0</span></span>
                </div>
                <div id="menu-grid" class="grid-opciones">
                    <div class="opcion-card full-width" onclick="navegarA('lobby')">🎮 INICIAR PARTIDA</div>
                    <div class="opcion-card" onclick="navegarA('personajes')">👤 GUERREROS</div>
                    <div class="opcion-card" onclick="navegarA('tienda')">🛒 TIENDA</div>
                    <div class="opcion-card" onclick="navegarA('sala')">🏠 SALA</div>
                </div>
                <div id="sub-lobby" class="sub-menu">
                    <p id="txt-sala">Buscando jugadores...</p>
                    <button id="btn-start" style="display:none; background:#f0f; color:#fff; width:100%;" onclick="socket.emit('solicitar_inicio_partida')">¡EMPEZAR!</button>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://server-solo-un-punto.onrender.com");
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Variables de Juego
let player = { x: 2500, y: 2500, type: 'circulo', vivo: true, angle: 0 };
let players = {};
let items = [];
let walls = [];
let zona = { x: 2500, y: 2500, radio: 2500 };
let juegoIniciado = false;

// --- LÓGICA DE MENÚ ---
function mostrarModo(m) {
    document.getElementById('form-login').style.display = m === 'login' ? 'block' : 'none';
    document.getElementById('form-registro').style.display = m === 'registro' ? 'block' : 'none';
}
function navegarA(s) {
    document.getElementById('menu-grid').style.display = 'none';
    document.getElementById('sub-' + s).style.display = 'block';
}
function login() {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    if(email && pass) socket.emit('login_usuario', { email, password: pass });
}

// --- RECEPCIÓN DE DATOS DEL SERVIDOR ---
socket.on('login_resultado', d => {
    if(d.exito) {
        document.getElementById('seccion-auth').style.display = 'none';
        document.getElementById('menu-principal').style.display = 'block';
        document.getElementById('display-user').innerText = d.username;
    }
});

socket.on('iniciar_partida', data => {
    items = data.items;
    walls = data.walls;
    zona = data.zona;
    juegoIniciado = true;
    document.getElementById('pantalla-inicio').style.display = 'none';
});

socket.on('actualizar_zona', data => { zona = data.zona; });
socket.on('playerMoved', data => { players[data.id] = data; });
socket.on('playerDisconnected', id => { delete players[id]; });

// --- RENDERIZADO (RECUPERADO) ---
function drawPlayer(p, isMe) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle || 0);
    ctx.fillStyle = isMe ? "#0f0" : "#f00";
    ctx.shadowBlur = 10;
    ctx.shadowColor = ctx.fillStyle;
    
    if(p.type === 'cuadrado') ctx.fillRect(-15, -15, 30, 30);
    else if(p.type === 'triangulo') {
        ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-12,12); ctx.lineTo(-12,-12); ctx.fill();
    } else {
        ctx.beginPath(); ctx.arc(0,0, 15, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function draw() {
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight;
    
    // Fondo negro base
    ctx.fillStyle = '#050505'; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (juegoIniciado) {
        ctx.save();
        
        // 1. CÁMARA: Centrar en tu posición
        ctx.translate(canvas.width / 2 - player.x, canvas.height / 2 - player.y);

        // 2. DIBUJAR PISO (Cuadrícula para referencia visual)
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 1;
        for (let i = 0; i <= 5000; i += 100) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 5000); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(5000, i); ctx.stroke();
        }

        // 3. DIBUJAR MUROS (Los que vienen del servidor)
        ctx.fillStyle = "#222"; // Color gris oscuro para las paredes
        ctx.strokeStyle = "#0f0"; // Borde verde neón
        ctx.lineWidth = 2;
        walls.forEach(w => {
            ctx.fillRect(w.x, w.y, w.w, w.h);
            ctx.strokeRect(w.x, w.y, w.w, w.h);
        });

        // 4. DIBUJAR ÍTEMS
        items.forEach(it => {
            ctx.fillStyle = it.type === 'weapon' ? '#ff0' : '#0ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath(); ctx.arc(it.x, it.y, 8, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        });

        // 5. OTROS JUGADORES
        for (let id in players) {
            if (id !== socket.id) drawPlayer(players[id], false);
        }

        // 6. MI JUGADOR
        if (player.vivo) drawPlayer(player, true);

        // 7. LA ZONA (Círculo rojo)
        ctx.strokeStyle = "red";
        ctx.lineWidth = 5;
        ctx.beginPath(); 
        ctx.arc(zona.x, zona.y, zona.radio, 0, Math.PI * 2); 
        ctx.stroke();

        ctx.restore();
    } else {
        // Si no ha iniciado, puedes poner aquí la animación de guerreros peleando
        actualizarFondo(); 
    }
    
    requestAnimationFrame(draw);
}
draw();

// Movimiento básico para probar
window.addEventListener('keydown', e => {
    if(e.key === 'w') player.y -= 10;
    if(e.key === 's') player.y += 10;
    if(e.key === 'a') player.x -= 10;
    if(e.key === 'd') player.x += 10;
    socket.emit('move', player);
});
</script>
</body>
</html>
