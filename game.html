<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - HG Studios V2.0</title>
    <style>
        /* 1. AJUSTE DE FONDO: Quitamos el gradiente sólido para ver el canvas */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; /* El juego/animación siempre al fondo */
        }

        .pantalla { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; /* La interfaz por encima */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: transparent; /* TRANSPARENTE para ver la animación */
        }
        
        .form-container { 
            background: rgba(10, 10, 10, 0.85); /* Fondo semi-transparente para el cuadro */
            padding: 30px; 
            border-radius: 20px; 
            border: 2px solid #0f0; 
            width: 85%; 
            max-width: 450px; 
            text-align: center; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            backdrop-filter: blur(5px); /* Efecto de cristal esmerilado */
        }
        
        /* Estilos de botones y textos */
        .logo-hg { color: #f00; font-weight: bold; border: 1px solid #f00; padding: 2px 10px; font-size: 0.9em; margin-bottom: 10px; display: inline-block; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #0f0; background: #111; color: #0f0; outline: none; }
        button { cursor: pointer; transition: 0.3s; border-radius: 8px; font-weight: bold; border: none; margin: 5px; }

        #menu-principal { display: none; width: 100%; }
        .grid-opciones { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .opcion-card { background: #111; border: 2px solid #0f0; border-radius: 12px; padding: 15px; cursor: pointer; color: white; display: flex; flex-direction: column; align-items: center; }
        .opcion-card:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }
        .full-width { grid-column: span 2; background: #0f0; color: #000; font-size: 1.1em; }
        .sub-menu { display: none; width: 100%; margin-top: 15px; }
        .btn-volver { background: #333; color: #fff; padding: 10px; width: 100%; }
        .btn-logout { background: transparent; color: #f00; border: 1px solid #f00; padding: 5px 15px; font-size: 0.7em; margin-top: 20px; }
        .stats-top { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; color: #0ff; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="pantalla-inicio" class="pantalla">
        <div class="form-container"> 
            <div class="logo-hg">HG STUDIOS V2.0</div>
            <h1 id="titulo-dinamico" style="color:#0f0; margin: 5px 0 10px; text-shadow: 0 0 15px #0f0;">SOLO UN PUNTO</h1>
            
            <div id="seccion-auth">
                <div style="display:flex; gap:5px; margin-bottom: 10px;">
                    <button onclick="mostrarModo('login')" style="flex:1; background:#222; color:#0f0; border:1px solid #0f0;">ENTRAR</button>
                    <button onclick="mostrarModo('registro')" style="flex:1; background:#222; color:#0f0; border:1px solid #0f0;">REGISTRO</button>
                </div>
                <div id="form-login">
                    <input type="email" id="l-email" placeholder="Correo">
                    <input type="password" id="l-pass" placeholder="Contraseña">
                    <button onclick="login()" style="width:100%; padding:12px; background:#0f0; color:#000;">ACCEDER</button>
                </div>
                <div id="form-registro" style="display:none;">
                    <input type="text" id="r-user" placeholder="Usuario">
                    <input type="email" id="r-email" placeholder="Correo">
                    <input type="password" id="r-pass" placeholder="Contraseña">
                    <button onclick="registro()" style="width:100%; padding:12px; background:#00ffff; color:#000;">REGISTRARME</button>
                </div>
            </div>

            <div id="menu-principal">
                <div class="stats-top">
                    <span id="display-user">PLAYER</span>
                    <span>💰 <span id="val-monedas">0</span></span>
                    <span>🏆 <span id="val-victorias">0</span></span>
                </div>
                <div id="menu-grid" class="grid-opciones">
                    <div class="opcion-card full-width" onclick="navegarA('lobby')">
                        <strong>🎮 INICIAR PARTIDA</strong>
                    </div>
                    <div class="opcion-card" onclick="navegarA('personajes')">👤 GUERREROS</div>
                    <div class="opcion-card" onclick="navegarA('tienda')">🛒 TIENDA HG</div>
                    <div class="opcion-card" onclick="navegarA('sala')">🏠 CREAR SALA</div>
                </div>
                <div id="sub-lobby" class="sub-menu">
                    <p id="txt-sala" style="color:#0f0;">Esperando jugadores...</p>
                    <button id="btn-start" style="display:none; background:#f0f; color:#fff; width:100%;" onclick="socket.emit('solicitar_inicio_partida')">¡EMPEZAR!</button>
                    <button class="btn-volver" onclick="volverMenu()">ATRÁS</button>
                </div>
                <button class="btn-logout" onclick="location.reload()">CERRAR SESIÓN</button>
            </div>
        </div>
    </div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://server-solo-un-punto.onrender.com");
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let juegoIniciado = false;
let combatientesFondo = [];

// --- ANIMACIÓN DE FONDO ---
function crearCombatiente() {
    const tipos = ['circulo', 'cuadrado', 'triangulo'];
    return {
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        type: tipos[Math.floor(Math.random() * tipos.length)],
        angle: Math.random() * Math.PI * 2,
        color: `hsl(${Math.random() * 360}, 80%, 60%)`
    };
}

for(let i = 0; i < 20; i++) combatientesFondo.push(crearCombatiente());

function actualizarFondo() {
    combatientesFondo.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.angle += 0.05;
        if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        
        if(p.type === 'cuadrado') ctx.fillRect(-12, -12, 24, 24);
        else if(p.type === 'triangulo') {
            ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-10,10); ctx.lineTo(-10,-10); ctx.fill();
        } else {
            ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
        }
        
        // Simular disparos láser
        if(Math.random() > 0.97) {
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(60, 0); ctx.stroke();
        }
        ctx.restore();
    });
}

// --- LÓGICA DE INTERFAZ ---
function mostrarModo(modo) {
    document.getElementById('form-login').style.display = modo === 'login' ? 'block' : 'none';
    document.getElementById('form-registro').style.display = modo === 'registro' ? 'block' : 'none';
}

function navegarA(seccion) {
    document.getElementById('menu-grid').style.display = 'none';
    document.querySelectorAll('.sub-menu').forEach(m => m.style.display = 'none');
    document.getElementById('sub-' + seccion).style.display = 'block';
}

function volverMenu() {
    document.getElementById('menu-grid').style.display = 'grid';
    document.querySelectorAll('.sub-menu').forEach(m => m.style.display = 'none');
}

function login() {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    if(email && pass) socket.emit('login_usuario', { email, password: pass });
}

socket.on('login_resultado', d => {
    if(d.exito) {
        document.getElementById('seccion-auth').style.display = 'none';
        document.getElementById('menu-principal').style.display = 'block';
        document.getElementById('display-user').innerText = d.username.toUpperCase();
    } else { alert("Error"); }
});

socket.on('iniciar_partida', () => {
    juegoIniciado = true;
    document.getElementById('pantalla-inicio').style.display = 'none';
});

function draw() {
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight;
    
    // Limpiar con negro puro
    ctx.fillStyle = '#000'; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if(!juegoIniciado) {
        actualizarFondo();
    }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
