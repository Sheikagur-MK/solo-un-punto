<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solo un Punto - HG</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #0f0; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 20; }
        .box { border: 2px solid #0f0; padding: 20px; text-align: center; background: #050505; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px 0; width: 200px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #stats { position: fixed; top: 10px; left: 10px; z-index: 10; display: none; }
    </style>
</head>
<body>
    <div id="stats">SISTEMA ONLINE</div>
    <div id="overlay">
        <div class="box" id="auth-ui">
            <h2>ACCESO AL SISTEMA</h2>
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="pass" placeholder="PASSWORD">
            <br>
            <button onclick="conectar()">INGRESAR</button>
        </div>
        <div class="box" id="lobby-ui" style="display:none;">
            <h2>SALA DE ESPERA</h2>
            <p id="player-count">CONEXIONES: 0</p>
            <button id="start-btn" style="display:none;" onclick="socket.emit('solicitar_inicio_partida')">INICIAR</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://server-solo-un-punto.onrender.com");
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player = { x: 2500, y: 2500, vx: 0, vy: 0 };
let players = {};
let walls = [];
let zona = { radio: 2500 };
let cam = { x: 2500, y: 2500 };
let activo = false;
const keys = {};

function conectar() {
    socket.emit('login_usuario', { 
        email: document.getElementById('email').value, 
        password: document.getElementById('pass').value 
    });
}

socket.on('login_resultado', d => {
    if(d.exito) {
        document.getElementById('auth-ui').style.display = 'none';
        document.getElementById('lobby-ui').style.display = 'block';
    }
});

socket.on('actualizar_sala', d => {
    document.getElementById('player-count').innerText = `CONEXIONES: ${d.total}`;
    document.getElementById('start-btn').style.display = (socket.id === d.hostId) ? 'block' : 'none';
});

socket.on('iniciar_partida', data => {
    walls = data.walls;
    zona = data.zona;
    activo = true;
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('stats').style.display = 'block';
});

socket.on('playerMoved', d => players[d.id] = d);
socket.on('actualizar_zona', d => zona = d.zona);

function update() {
    if(!activo) return;
    if(keys['w']) player.vy -= 0.7;
    if(keys['s']) player.vy += 0.7;
    if(keys['a']) player.vx -= 0.7;
    if(keys['d']) player.vx += 0.7;

    player.vx *= 0.95;
    player.vy *= 0.95;
    player.x += player.vx;
    player.y += player.vy;

    cam.x += (player.x - cam.x) * 0.1;
    cam.y += (player.y - cam.y) * 0.1;

    socket.emit('move', { x: player.x, y: player.y });
}

function loop() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    update();

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if(activo) {
        ctx.save();
        ctx.translate(canvas.width/2 - cam.x, canvas.height/2 - cam.y);

        // Muros neón
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = 2;
        walls.forEach(w => {
            ctx.strokeRect(w.x, w.y, w.w, w.h);
        });

        // Otros
        ctx.fillStyle = '#f00';
        for(let id in players) {
            ctx.beginPath(); ctx.arc(players[id].x, players[id].y, 15, 0, Math.PI*2); ctx.fill();
        }

        // Usuario local
        ctx.fillStyle = '#0f0';
        ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, Math.PI*2); ctx.fill();

        // Cierre de zona
        ctx.strokeStyle = '#f00';
        ctx.beginPath(); ctx.arc(2500, 2500, zona.radio, 0, Math.PI*2); ctx.stroke();

        ctx.restore();
    }
    requestAnimationFrame(loop);
}

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
loop();
</script>
</body>
</html>
