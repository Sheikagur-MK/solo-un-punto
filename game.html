<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - HG Studios V2.0</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* LOGOTIPO HG STUDIOS */
        .logo-hg { color: #f00; font-weight: bold; border: 1px solid #f00; padding: 2px 10px; font-size: 0.9em; margin-bottom: 10px; display: inline-block; letter-spacing: 1px; }

        /* UI DE JUEGO */
        #ui-info { position: fixed; top: 10px; right: 10px; color: white; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; border: 1px solid #0f0; z-index: 100; font-size: 14px; box-shadow: 0 0 10px #0f0; }
        #aviso-zona { position: fixed; top: 25%; left: 50%; transform: translateX(-50%); color: #ff0000; font-size: 2.5em; font-weight: bold; display: none; z-index: 100; text-shadow: 0 0 20px #f00; text-align: center; }
        #dash-count { position: fixed; bottom: 150px; right: 40px; color: #00ffff; font-size: 1.5em; font-weight: bold; text-shadow: 0 0 10px #0ff; display: none; }

        /* PANTALLAS */
        .pantalla { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        
        /* CANDADO VISUAL: La pantalla de fin nace muerta */
        #pantalla-fin { display: none !important; z-index: 10000; }

        .form-container { background: rgba(26, 26, 26, 0.9); padding: 30px; border-radius: 20px; border: 2px solid #0f0; width: 85%; max-width: 450px; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #0f0; background: #111; color: #0f0; outline: none; transition: 0.3s; }
        button { width: 100%; padding: 14px; background: #0f0; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 15px; color: #000; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        
        /* LOBBY Y STATS */
        #lobby-menu { display: none; width: 100%; }
        .stats-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #0f0; color: #0ff; font-weight: bold; }

        /* TARJETAS DE PERSONAJE */
        .grid-personajes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card-pj { background: #111; border: 2px solid #444; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 0.7em; }
        .card-pj.selected { border-color: #0f0; background: #030; box-shadow: 0 0 15px #0f0; }
        .attr-bar { background: #333; height: 4px; width: 100%; margin-top: 4px; border-radius: 2px; overflow: hidden; }
        .attr-fill { height: 100%; background: #0f0; }

        .preview { width: 30px; height: 30px; margin: 0 auto 10px; border: 2px solid #fff; }
        .circ { border-radius: 50%; }
        .tri { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid #fff; }

        /* CONTROLES MÓVILES */
        #ui-android { position: fixed; bottom: 0; left: 0; width: 100%; height: 200px; pointer-events: none; display: none; z-index: 10; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(0,255,0,0.3); }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #0f0; border-radius: 50%; }
        #btn-dash { position: absolute; bottom: 60px; right: 40px; width: 90px; height: 90px; background: #0ff; border-radius: 50%; pointer-events: auto; border: 3px solid #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui-info">FASE: <span id="fase-val">1</span>/4 | CIERRE EN: <span id="timer-val">120</span>s</div>
    <div id="aviso-zona">¡FUERA DE LA ZONA!<br><span id="count-zona">5</span>s</div>
    <div id="dash-count">DASH: 0</div>

    <div id="pantalla-inicio" class="pantalla">
        <div class="form-container"> 
            <div class="logo-hg">HG STUDIOS V2.0</div>
            <h1 style="color:#0f0; margin: 5px 0 20px; text-shadow: 0 0 15px #0f0; letter-spacing: 2px;">SOLO UN PUNTO</h1>
            
            <div id="seccion-auth">
                <div style="display:flex; gap:10px; margin-bottom: 15px;">
                   <button onclick="mostrarModo('login')" style="background:#333; color:#0f0; border:1px solid #0f0;">LOGIN</button>
                   <button onclick="mostrarModo('registro')" style="background:#333; color:#0f0; border:1px solid #0f0;">REGISTRO</button>
                </div>
                <div id="form-login">
                    <input type="email" id="l-email" placeholder="Correo Electrónico">
                    <input type="password" id="l-pass" placeholder="Contraseña">
                    <button onclick="login()">ENTRAR AL SISTEMA</button>
                </div>
                <div id="form-registro" style="display:none;">
                    <input type="text" id="r-user" placeholder="Nombre de Guerrero">
                    <input type="email" id="r-email" placeholder="Correo Electrónico">
                    <input type="password" id="r-pass" placeholder="Contraseña">
                    <button onclick="registro()" style="background:#00ffff;">CREAR CUENTA</button>
                </div>
            </div>

            <div id="lobby-menu">
                <div class="stats-bar">
                    <span>🏆 <span id="val-victorias">0</span></span>
                    <span>💰 <span id="val-monedas">0</span></span>
                    <span id="val-username" style="color:#0f0">GUERRERO</span>
                </div>
                <div class="grid-personajes">
                    <div class="card-pj selected" id="card-circulo" onclick="seleccionarClase('circulo')">
                        <div class="preview circ"></div><strong>ASALTANTE</strong>
                    </div>
                    <div class="card-pj" id="card-cuadrado" onclick="seleccionarClase('cuadrado')">
                        <div class="preview" style="border-radius:2px"></div><strong>TANQUE</strong>
                    </div>
                    <div class="card-pj" id="card-triangulo" onclick="seleccionarClase('triangulo')">
                        <div class="preview tri"></div><strong>ESTRATEGA</strong>
                    </div>
                </div>
                <p id="txt-sala" style="color:#0f0; font-size: 0.8em; font-weight:bold;">Conectando...</p>
                <button id="btn-start" style="display:none; background:#f0f; color:white;" onclick="socket.emit('solicitar_inicio_partida')">¡INICIAR PARTIDA!</button>
            </div>
        </div>
    </div>

    <div id="pantalla-fin" class="pantalla">
        <div class="form-container" style="border-color: #0ff;">
            <h1 id="titulo-final">FIN DEL COMBATE</h1>
            <div id="texto-puesto">#1</div>
            <div id="stats-jugador"></div>
            <button onclick="location.reload()" style="background:#0f0;">VOLVER AL LOBBY</button>
        </div>
    </div>

    <div id="ui-android">
        <div id="joy-base"><div id="joy-stick"></div></div>
        <button id="btn-dash">DASH</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://server-solo-un-punto.onrender.com");
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player = { x: 2500, y: 2500, speed: 7.5, angle: 0, stretch: 1, anim: 0, vivo: true, hasWeapon: false, dashCharges: 0, type: 'circulo' };
let players = {}, items = [], walls = [], zona = { x:2500, y:2500, radio:2500 };
let juegoIniciado = false, joyX = 0, joyY = 0, teclas = {};
let fueraInterval = null;

// Asegurar estado inicial
document.getElementById('pantalla-fin').style.setProperty('display', 'none', 'important');

if(/Android|iPhone/i.test(navigator.userAgent)) {
    document.getElementById('ui-android').style.display = 'block';
    document.getElementById('dash-count').style.display = 'block';
}
    
window.onkeydown = e => teclas[e.code] = true;
window.onkeyup = e => teclas[e.code] = false;

function mostrarModo(modo) {
    document.getElementById('form-login').style.display = modo === 'login' ? 'block' : 'none';
    document.getElementById('form-registro').style.display = modo === 'registro' ? 'block' : 'none';
}

function seleccionarClase(clase) {
    player.type = clase;
    document.querySelectorAll('.card-pj').forEach(c => c.classList.remove('selected'));
    document.getElementById('card-' + clase).classList.add('selected');
    player.speed = (clase === 'circulo') ? 7.5 : (clase === 'cuadrado' ? 5.5 : 6.5);
}

function login() { 
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    if(email && pass) socket.emit('login_usuario', { email, password: pass }); 
}

function registro() {
    const datos = { 
        username: document.getElementById('r-user').value, 
        email: document.getElementById('r-email').value, 
        password: document.getElementById('r-pass').value 
    };
    if(datos.username && datos.email && datos.password) socket.emit('registrar_usuario', datos);
}

socket.on('login_resultado', d => {
    if(d.exito) {
        document.getElementById('seccion-auth').style.display = 'none';
        document.getElementById('lobby-menu').style.display = 'block';
        document.getElementById('val-monedas').innerText = d.monedas;
        document.getElementById('val-victorias').innerText = d.victorias;
        document.getElementById('val-username').innerText = d.username.toUpperCase();
    } else { alert("Error de acceso."); }
});

socket.on('actualizar_sala', d => {
    document.getElementById('txt-sala').innerText = `Jugadores Listos: ${d.total}`;
    if(socket.id === d.hostId) document.getElementById('btn-start').style.display = 'block';
});

socket.on('iniciar_partida', d => {
    items = d.items; zona = d.zona; walls = d.walls || [];
    juegoIniciado = true;
    player.vivo = true; 
    document.getElementById('pantalla-inicio').style.display = 'none';
    document.getElementById('pantalla-fin').style.setProperty('display', 'none', 'important');
});

socket.on('eres_ganador', (stats) => {
    if (juegoIniciado) {
        document.getElementById('pantalla-fin').style.setProperty('display', 'flex', 'important');
        document.getElementById('titulo-final').innerText = "¡CAMPEÓN!";
        document.getElementById('texto-puesto').innerText = "#1";
        document.getElementById('stats-jugador').innerHTML = `Victorias: ${stats.victorias} | Monedas: ${stats.monedas}`;
        juegoIniciado = false;
    }
});

socket.on('has_muerto', (ranking) => {
    if (juegoIniciado) {
        player.vivo = false;
        document.getElementById('pantalla-fin').style.setProperty('display', 'flex', 'important');
        document.getElementById('titulo-final').innerText = "ELIMINADO";
        document.getElementById('texto-puesto').innerText = "#" + ranking;
        juegoIniciado = false;
    }
});

function drawShape(p, isMe) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.shadowBlur = 15;
    ctx.shadowColor = p.hasWeapon ? "#f00" : (isMe ? "#0f0" : "#555");
    ctx.fillStyle = ctx.shadowColor;

    if(p.type === 'cuadrado') {
        ctx.fillRect(-18, -18, 36, 36);
    } else if(p.type === 'triangulo') {
        ctx.beginPath(); ctx.moveTo(22, 0); ctx.lineTo(-15, 18); ctx.lineTo(-15, -18); ctx.closePath(); ctx.fill();
    } else {
        ctx.beginPath(); ctx.ellipse(0, 0, 15 * (p.stretch || 1), 13, 0, 0, Math.PI * 2); ctx.fill();
    }
    if(p.hasWeapon) { ctx.fillStyle = "#fff"; ctx.fillRect(12, -4, 25, 8); }
    ctx.restore();
}

function handleInput() {
    if(!player.vivo) return;
    let dx = 0, dy = 0;
    if(teclas['ArrowUp'] || teclas['KeyW']) dy = -1;
    if(teclas['ArrowDown'] || teclas['KeyS']) dy = 1;
    if(teclas['ArrowLeft'] || teclas['KeyA']) dx = -1;
    if(teclas['ArrowRight'] || teclas['KeyD']) dx = 1;
    if(teclas['Space']) ejecutarDash();
    if(joyX !== 0 || joyY !== 0) { dx = joyX; dy = joyY; }

    if(dx !== 0 || dy !== 0) {
        let nextX = player.x + dx * player.speed;
        let nextY = player.y + dy * player.speed;
        let hitWall = false;
        walls.forEach(w => { if(nextX > w.x && nextX < w.x + w.w && nextY > w.y && nextY < w.y + w.h) hitWall = true; });

        if(!hitWall) {
            player.x = nextX; player.y = nextY;
            player.angle = Math.atan2(dy, dx);
            player.anim += 0.2;
            player.stretch = 1 + Math.abs(Math.sin(player.anim)) * 0.2;
        }
    }

    items.forEach(it => {
        if(Math.hypot(player.x - it.x, player.y - it.y) < 35) {
            if(it.type === 'weapon' && !player.hasWeapon) { player.hasWeapon = true; socket.emit('item_recogido', it.id); }
            else if(it.type === 'dash') { player.dashCharges = 5; socket.emit('item_recogido', it.id); }
        }
    });

    if(player.hasWeapon) {
        for(let id in players) {
            if(Math.hypot(player.x - players[id].x, player.y - players[id].y) < 40) socket.emit('eliminar_jugador', id);
        }
    }

    const dist = Math.hypot(player.x - zona.x, player.y - zona.y);
    if(dist > zona.radio && player.vivo) {
        if(!fueraInterval) {
            let t = (player.type === 'cuadrado') ? 8 : 5;
            document.getElementById('aviso-zona').style.display = 'block';
            fueraInterval = setInterval(() => {
                t--; document.getElementById('count-zona').innerText = t;
                if(t <= 0) { socket.emit('eliminar_jugador', socket.id); clearInterval(fueraInterval); }
            }, 1000);
        }
    } else { clearInterval(fueraInterval); fueraInterval = null; document.getElementById('aviso-zona').style.display = 'none'; }
}

function ejecutarDash() {
    if(player.dashCharges > 0 && player.speed < 15) {
        const prevSpeed = player.speed; player.speed = 22; player.dashCharges--;
        setTimeout(() => player.speed = prevSpeed, 200);
    }
}

function draw() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0, canvas.width, canvas.height);
    
    if(!juegoIniciado) { requestAnimationFrame(draw); return; }
    handleInput();

    ctx.save();
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);
    ctx.fillStyle = "#1a1a1a"; walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

    items.forEach(it => {
        ctx.fillStyle = it.type === 'weapon' ? '#f00' : '#0ff';
        ctx.fillRect(it.x, it.y, 20, 20);
    });

    for(let id in players) drawShape(players[id], false);
    if(player.vivo) {
        drawShape(player, true);
        socket.emit('move', { x: player.x, y: player.y, angle: player.angle, stretch: player.stretch, hasWeapon: player.hasWeapon, type: player.type });
    }

    ctx.strokeStyle = "red"; ctx.lineWidth = 10;
    ctx.beginPath(); ctx.arc(zona.x, zona.y, zona.radio, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
    requestAnimationFrame(draw);
}

const jBase = document.getElementById('joy-base'), jStick = document.getElementById('joy-stick');
jBase.ontouchmove = e => {
    const t = e.touches[0], r = jBase.getBoundingClientRect();
    let dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
    const d = Math.hypot(dx, dy); if(d > 45) { dx *= 45/d; dy *= 45/d; }
    jStick.style.transform = `translate(${dx}px, ${dy}px)`;
    joyX = dx/45; joyY = dy/45;
};
jBase.ontouchend = () => { jStick.style.transform = 'translate(0,0)'; joyX = 0; joyY = 0; };
document.getElementById('btn-dash').ontouchstart = (e) => { e.preventDefault(); ejecutarDash(); };

socket.on('playerMoved', d => { players[d.id] = d; });
socket.on('playerDisconnected', id => { delete players[id]; });
socket.on('item_eliminado', id => items = items.filter(it => it.id !== id));
socket.on('actualizar_zona', d => {
    zona = d.zona;
    document.getElementById('fase-val').innerText = d.fase;
    document.getElementById('timer-val').innerText = d.tiempo;
});

draw();
</script>
</body>
</html>
