<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - HG Studios V2.0</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        .logo-hg { color: #f00; font-weight: bold; border: 1px solid #f00; padding: 2px 10px; font-size: 0.9em; margin-bottom: 10px; display: inline-block; letter-spacing: 1px; }

        /* PANTALLAS */
        .pantalla { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #pantalla-fin { display: none !important; z-index: 10000; }

        .form-container { background: rgba(26, 26, 26, 0.9); padding: 30px; border-radius: 20px; border: 2px solid #0f0; width: 85%; max-width: 500px; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); }
        
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #0f0; background: #111; color: #0f0; outline: none; }
        button { cursor: pointer; transition: 0.3s; border-radius: 8px; font-weight: bold; text-transform: uppercase; border: none; }

        /* SISTEMA DE MENÚ */
        #menu-principal { display: none; width: 100%; }
        .grid-opciones { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        
        .opcion-card { background: #111; border: 2px solid #0f0; border-radius: 15px; padding: 20px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .opcion-card:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; transform: translateY(-5px); }
        .full-width { grid-column: span 2; background: #0f0; color: #000; font-size: 1.2em; font-weight: bold; }

        /* SUB-MENÚS */
        .sub-menu { display: none; width: 100%; margin-top: 15px; }
        .btn-volver { background: #333; color: #fff; margin-top: 15px; padding: 10px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        .btn-logout { background: transparent; color: #f00; border: 1px solid #f00; padding: 5px 15px; font-size: 0.7em; margin-top: 20px; }
        .btn-logout:hover { background: #f00; color: #fff; }

        /* LOBBY Y STATS */
        .stats-top { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; color: #0ff; font-size: 0.9em; }

        /* PERSONAJES */
        .grid-pj { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .card-pj { background: #111; border: 2px solid #444; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.7em; }
        .card-pj.selected { border-color: #0f0; background: #030; box-shadow: 0 0 15px #0f0; }
        .preview { width: 30px; height: 30px; margin: 0 auto 5px; border: 2px solid #fff; }
        .circ { border-radius: 50%; }
        .tri { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid #fff; }
    </style>
</head>
<body>
    <div id="pantalla-inicio" class="pantalla">
        <div class="form-container"> 
            <div class="logo-hg">HG STUDIOS V2.0</div>
            <h1 id="titulo-dinamico" style="color:#0f0; margin: 5px 0 10px; text-shadow: 0 0 15px #0f0; letter-spacing: 2px;">SOLO UN PUNTO</h1>
            
            <!-- SECCIÓN: AUTH (REESTABLECIDA) -->
            <div id="seccion-auth">
                <div style="display:flex; gap:10px; margin-bottom: 15px;">
                    <button onclick="mostrarModo('login')" style="flex:1; padding:10px; background:#333; color:#0f0; border:1px solid #0f0;">ENTRAR</button>
                    <button onclick="mostrarModo('registro')" style="flex:1; padding:10px; background:#333; color:#0f0; border:1px solid #0f0;">REGISTRO</button>
                </div>
                
                <div id="form-login">
                    <input type="email" id="l-email" placeholder="Correo Electrónico">
                    <input type="password" id="l-pass" placeholder="Contraseña">
                    <button onclick="login()" style="width:100%; padding:14px; background:#0f0; color:#000;">ACCEDER</button>
                </div>

                <div id="form-registro" style="display:none;">
                    <input type="text" id="r-user" placeholder="Nombre de Guerrero">
                    <input type="email" id="r-email" placeholder="Correo Electrónico">
                    <input type="password" id="r-pass" placeholder="Contraseña">
                    <button onclick="registro()" style="width:100%; padding:14px; background:#00ffff; color:#000;">CREAR CUENTA</button>
                </div>
            </div>

            <!-- SECCIÓN: MENÚ PRINCIPAL -->
            <div id="menu-principal">
                <div class="stats-top">
                    <span id="display-user">GUERRERO</span>
                    <span>💰 <span id="val-monedas">0</span></span>
                    <span>🏆 <span id="val-victorias">0</span></span>
                </div>

                <div id="menu-grid" class="grid-opciones">
                    <div class="opcion-card full-width" onclick="navegarA('lobby')">
                        <span>🎮 INICIAR PARTIDA</span>
                        <small>Entrar a la arena</small>
                    </div>
                    <div class="opcion-card" onclick="navegarA('personajes')">
                        <span>👤 GUERREROS</span>
                        <small>Clases</small>
                    </div>
                    <div class="opcion-card" onclick="navegarA('tienda')">
                        <span>🛒 TIENDA HG</span>
                        <small>Skins</small>
                    </div>
                    <div class="opcion-card" onclick="navegarA('sala')">
                        <span>🏠 CREAR SALA</span>
                        <small>Privada</small>
                    </div>
                </div>

                <!-- SUB-PANTALLAS -->
                <div id="sub-lobby" class="sub-menu">
                    <p id="txt-sala">Buscando jugadores...</p>
                    <button id="btn-start" style="display:none; background:#f0f; color:#fff; width:100%; padding:15px;" onclick="socket.emit('solicitar_inicio_partida')">¡EMPEZAR!</button>
                    <button class="btn-volver" onclick="volverMenu()">ATRÁS</button>
                </div>

                <div id="sub-personajes" class="sub-menu">
                    <div class="grid-pj">
                        <div class="card-pj selected" id="card-circulo" onclick="seleccionarClase('circulo')"><div class="preview circ"></div>ASALTANTE</div>
                        <div class="card-pj" id="card-cuadrado" onclick="seleccionarClase('cuadrado')"><div class="preview"></div>TANQUE</div>
                        <div class="card-pj" id="card-triangulo" onclick="seleccionarClase('triangulo')"><div class="preview tri"></div>ESTRATEGA</div>
                    </div>
                    <button class="btn-volver" onclick="volverMenu()">GUARDAR</button>
                </div>

                <div id="sub-tienda" class="sub-menu">
                    <p style="color:#aaa;">PRÓXIMAMENTE</p>
                    <button class="btn-volver" onclick="volverMenu()">VOLVER</button>
                </div>

                <div id="sub-sala" class="sub-menu">
                    <p>SALA PRIVADA</p>
                    <button class="btn-volver" onclick="volverMenu()">CANCELAR</button>
                </div>

                <button class="btn-logout" onclick="location.reload()">CERRAR SESIÓN</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://server-solo-un-punto.onrender.com");
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player = { x: 2500, y: 2500, speed: 7.5, vivo: true, type: 'circulo' };
let juegoIniciado = false;

// NAVEGACIÓN Y AUTH
function mostrarModo(modo) {
    document.getElementById('form-login').style.display = modo === 'login' ? 'block' : 'none';
    document.getElementById('form-registro').style.display = modo === 'registro' ? 'block' : 'none';
}

function navegarA(seccion) {
    document.getElementById('menu-grid').style.display = 'none';
    document.querySelectorAll('.sub-menu').forEach(m => m.style.display = 'none');
    document.getElementById('sub-' + seccion).style.display = 'block';
    document.getElementById('titulo-dinamico').innerText = seccion.toUpperCase();
}

function volverMenu() {
    document.getElementById('menu-grid').style.display = 'grid';
    document.querySelectorAll('.sub-menu').forEach(m => m.style.display = 'none');
    document.getElementById('titulo-dinamico').innerText = "MENÚ PRINCIPAL";
}

function login() {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    if(email && pass) socket.emit('login_usuario', { email, password: pass });
}

function registro() {
    const d = { 
        username: document.getElementById('r-user').value, 
        email: document.getElementById('r-email').value, 
        password: document.getElementById('r-pass').value 
    };
    if(d.username && d.email && d.password) socket.emit('registrar_usuario', d);
}

socket.on('login_resultado', d => {
    if(d.exito) {
        document.getElementById('seccion-auth').style.display = 'none';
        document.getElementById('menu-principal').style.display = 'block';
        document.getElementById('display-user').innerText = d.username.toUpperCase();
        document.getElementById('val-monedas').innerText = d.monedas;
        document.getElementById('val-victorias').innerText = d.victorias;
        document.getElementById('titulo-dinamico').innerText = "MENÚ PRINCIPAL";
    } else { alert("Datos incorrectos"); }
});

socket.on('actualizar_sala', d => {
    document.getElementById('txt-sala').innerText = `JUGADORES EN SALA: ${d.total}`;
    if(socket.id === d.hostId) document.getElementById('btn-start').style.display = 'block';
});

socket.on('iniciar_partida', () => {
    juegoIniciado = true;
    document.getElementById('pantalla-inicio').style.display = 'none';
});

function seleccionarClase(clase) {
    player.type = clase;
    document.querySelectorAll('.card-pj').forEach(c => c.classList.remove('selected'));
    document.getElementById('card-' + clase).classList.add('selected');
}

function draw() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0, canvas.width, canvas.height);
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
