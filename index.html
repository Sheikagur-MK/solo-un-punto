<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - Pro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
        canvas { display: block; }
        
        /* PANTALLA DE INICIO / LOGIN */
        #pantalla-inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
        }

        .form-container {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00ff00;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        #mensaje-servidor { font-size: 0.8em; margin-top: 10px; }

        /* UI DEL JUEGO */
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            font-family: 'Courier New', Courier, monospace; pointer-events: none; 
            text-shadow: 2px 2px 2px #000;
            display: none; /* Oculto hasta que inicie el juego */
        }
        .timer { color: #ffcc00; font-size: 1.2em; }
        #dashCount { color: #00ffff; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h1>SOLO UN PUNTO</h1>
        <div class="form-container">
            <h3>Registro de Jugador</h3>
            <input type="text" id="reg-user" placeholder="Nombre de usuario">
            <input type="email" id="reg-email" placeholder="Correo electrónico">
            <input type="password" id="reg-pass" placeholder="Contraseña">
            <button onclick="registrar()">Registrarse</button>
            <p id="mensaje-servidor"></p>
        </div>
    </div>

    <div id="ui">
        <h2 id="status">BUSCA UN RECTÁNGULO</h2>
        <div id="faseInfo">FASE: 1</div>
        <div id="timer" class="timer">Zona: 03:00</div>
        <div id="dashCount"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
// --- CONFIGURACIÓN DE RED ---
// Cambia esta URL por la de tu servidor de Render cuando lo despliegues
const socket = io("https://tu-servidor-en-render.com"); 

let juegoIniciado = false; // EL INTERRUPTOR PRINCIPAL

// --- REGISTRO CON MONGODB ---
function registrar() {
    const user = document.getElementById('reg-user').value;
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-pass').value;

    if(!user || !email || !pass) {
        alert("Por favor llena todos los campos");
        return;
    }

    socket.emit('registrar_usuario', {
        username: user,
        email: email,
        password: pass
    });
}

socket.on('registro_resultado', (data) => {
    const mensaje = document.getElementById('mensaje-servidor');
    if (data.exito) {
        // ACTIVAR EL JUEGO
        document.getElementById('pantalla-inicio').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        juegoIniciado = true;
    } else {
        mensaje.innerText = data.mensaje;
        mensaje.style.color = "red";
    }
});

// --- LÓGICA DEL JUEGO (TU CÓDIGO) ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let players = {};
socket.on('state', (serverPlayers) => { players = serverPlayers; });

const WORLD_SIZE = 5000; 
const DASH_COOLDOWN_TIME = 360; 
let gameOver = false;

const player = {
    x: WORLD_SIZE / 2,
    y: WORLD_SIZE / 2,
    radius: 12,
    speed: 5,
    hasWeapon: false,
    angle: 0,
    dashCooldown: 0,
    isDashing: false,
    superDashCharges: 0,
    outOfZoneTime: 0,
    walkCycle: 0,
    isMoving: false
};

// --- MUROS Y COLISIONES ---
let walls = [];
function createWall(x, y, w, h, isHorizontal) {
    if (Math.random() < 0.3) {
        let gapSize = player.radius * 2.8; 
        if (isHorizontal) {
            walls.push({x: x, y: y, w: w/2 - gapSize/2, h: h});
            walls.push({x: x + w/2 + gapSize/2, y: y, w: w/2 - gapSize/2, h: h});
        } else {
            walls.push({x: x, y: y, w: w, h: h/2 - gapSize/2});
            walls.push({x: x, y: y + h/2 + gapSize/2, w: w, h: h/2 - gapSize/2});
        }
    } else {
        walls.push({x: x, y: y, w: w, h: h});
    }
}

for(let i=0; i<100; i++) {
    let wx = Math.random() * (WORLD_SIZE - 400) + 200;
    let wy = Math.random() * (WORLD_SIZE - 400) + 200;
    if(Math.random() > 0.5) createWall(wx, wy, 300, 25, true);
    else createWall(wx, wy, 25, 300, false);
}

function checkWallCollision(px, py) {
    for (let wall of walls) {
        if (px + player.radius > wall.x && px - player.radius < wall.x + wall.w &&
            py + player.radius > wall.y && py - player.radius < wall.y + wall.h) return true;
    }
    return false;
}

function spawnPlayerSafely() {
    let safe = false;
    while (!safe) {
        player.x = Math.random() * (WORLD_SIZE - 1000) + 500;
        player.y = Math.random() * (WORLD_SIZE - 1000) + 500;
        if (!checkWallCollision(player.x, player.y)) safe = true;
    }
}
spawnPlayerSafely();

let items = [];
for(let i=0; i<80; i++) items.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, w: 30, h: 15, active: true, type: 'weapon' });
for(let i=0; i<20; i++) items.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, radius: 10, active: true, type: 'superdash' });

let zone = {
    x: WORLD_SIZE / 2, y: WORLD_SIZE / 2, radius: WORLD_SIZE / 1.2,
    targetX: WORLD_SIZE / 2, targetY: WORLD_SIZE / 2, targetRadius: WORLD_SIZE / 1.2,
    phase: 1, isShrinking: false, timeLeft: 180 
};

// --- CONTROLES ---
let isMobile = ('ontouchstart' in window);
let joystick = { active: false, id: null, startX: 100, startY: 0, curX: 100, curY: 0, moveX: 0, moveY: 0 };
let dashBtn = { x: 0, y: 0, radius: 45 };

function updateControlPositions() {
    joystick.startY = canvas.height - 120;
    dashBtn.x = canvas.width - 100;
    dashBtn.y = canvas.height - 100;
}
updateControlPositions();

if (isMobile) {
    canvas.addEventListener('touchstart', e => {
        if (!juegoIniciado) return;
        e.preventDefault();
        for (let t of e.changedTouches) {
            let distDash = Math.hypot(t.clientX - dashBtn.x, t.clientY - dashBtn.y);
            if (distDash < dashBtn.radius) startDash();
            else if (t.clientX < canvas.width / 2 && !joystick.active) {
                joystick.active = true; joystick.id = t.identifier;
                joystick.startX = t.clientX; joystick.startY = t.clientY;
            }
        }
    }, { passive: false });
    // (Añadir eventos touchmove y touchend aquí como los tenías)
}

function update() {
    if (gameOver || !juegoIniciado) return; // NO ACTUALIZAR SI NO HA INICIADO
    
    let vx = 0, vy = 0;
    if (isMobile && joystick.active) { vx = joystick.moveX; vy = joystick.moveY; }
    
    player.isMoving = Math.abs(vx) > 0.1 || Math.abs(vy) > 0.1;
    let speed = player.isDashing ? player.speed * 3 : player.speed;
    
    let nextX = player.x + vx * speed, nextY = player.y + vy * speed;
    if (!checkWallCollision(nextX, player.y)) player.x = nextX;
    if (!checkWallCollision(player.x, nextY)) player.y = nextY;
    
    if (player.isMoving) { player.angle = Math.atan2(vy, vx); player.walkCycle += 0.15; }
    if (player.dashCooldown > 0) player.dashCooldown--;

    // Zona y colisiones con ítems (se mantiene igual)
    // ...
}

function draw() {
    if (!juegoIniciado) {
        requestAnimationFrame(draw);
        return; // Detener el dibujo si no ha iniciado
    }

    update();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2); 
    ctx.scale(0.6, 0.6); 
    ctx.translate(-player.x, -player.y); 

    walls.forEach(w => { ctx.fillStyle = "#444"; ctx.fillRect(w.x, w.y, w.w, w.h); });
    ctx.beginPath(); ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI*2);
    ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 15; ctx.stroke();

    items.forEach(item => { 
        if(item.active) {
            ctx.fillStyle = item.type === 'weapon' ? "red" : "#00ffff";
            if(item.type === 'weapon') ctx.fillRect(item.x, item.y, 30, 15);
            else { ctx.beginPath(); ctx.arc(item.x, item.y, 10, 0, Math.PI*2); ctx.fill(); }
        }
    });

    // Dibujo del Jugador
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2);
    ctx.fillStyle = "#00ff00";
    ctx.fill();
    ctx.restore();
    
    ctx.restore();

    // Dibujo de Controles Mobile
    if(isMobile) {
        ctx.beginPath(); ctx.arc(joystick.startX, joystick.startY, 50, 0, Math.PI*2); ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.stroke();
        ctx.beginPath(); ctx.arc(dashBtn.x, dashBtn.y, dashBtn.radius, 0, Math.PI*2); ctx.fillStyle = "rgba(255, 255, 255, 0.3)"; ctx.fill();
    }
    
    requestAnimationFrame(draw);
}

setInterval(() => {
    if (gameOver || !juegoIniciado) return;
    if (zone.timeLeft > 0) zone.timeLeft--;
    // Lógica de fases de zona...
}, 1000);

draw();
</script>
</body>
</html>
