<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui-android { position: fixed; bottom: 0; left: 0; width: 100%; height: 200px; pointer-events: none; display: none; z-index: 10; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #0f0; border-radius: 50%; }
        #btn-dash { position: absolute; bottom: 60px; right: 40px; width: 80px; height: 80px; background: #0ff; border-radius: 50%; pointer-events: auto; border: none; font-weight: bold; }
        #aviso-zona { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); color: red; font-size: 2em; font-weight: bold; display: none; z-index: 20; text-shadow: 2px 2px #000; }
        .pantalla { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .form-container { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid #00ff00; width: 85%; max-width: 320px; text-align: center; }
        button { width: 100%; padding: 12px; background: #00ff00; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="aviso-zona">¡REGRESA A LA ZONA! <span id="timer-zona">5</span>s</div>

    <div id="pantalla-inicio" class="pantalla">
        <div class="form-container">
            <h1 style="color:#0f0">SOLO UN PUNTO</h1>
            <input type="email" id="l-email" placeholder="Correo" style="width:90%; padding:10px; margin:5px;">
            <input type="password" id="l-pass" placeholder="Contraseña" style="width:90%; padding:10px; margin:5px;">
            <button onclick="login()">ENTRAR</button>
            <p id="txt-sala">Cargando...</p>
            <button id="btn-start" style="display:none" onclick="socket.emit('solicitar_inicio_partida')">INICIAR</button>
        </div>
    </div>

    <div id="ui-android">
        <div id="joy-base"><div id="joy-stick"></div></div>
        <button id="btn-dash">DASH</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://server-solo-un-punto.onrender.com");
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player = { x: 2500, y: 2500, speed: 6, angle: 0, stretch: 1, anim: 0, vivo: true, hasWeapon: false };
let players = {}, items = [], walls = [], particles = [], zona = { x:2500, y:2500, radio:2500 };
let juegoIniciado = false, joyX = 0, joyY = 0, teclas = {};
let tiempoFuera = 0, fueraInterval = null;

if(/Android|iPhone/i.test(navigator.userAgent)) document.getElementById('ui-android').style.display = 'block';

// CONTROLES PC
window.onkeydown = e => teclas[e.code] = true;
window.onkeyup = e => teclas[e.code] = false;

function login() { socket.emit('login_usuario', { email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value }); }
socket.on('login_resultado', d => { if(d.exito) document.getElementById('txt-sala').innerText = "Conectado. Esperando..."; });
socket.on('actualizar_sala', d => {
    document.getElementById('txt-sala').innerText = `Jugadores: ${d.total}`;
    if(socket.id === d.hostId) document.getElementById('btn-start').style.display = 'block';
});

socket.on('iniciar_partida', d => {
    items = d.items; zona = d.zona; walls = d.walls;
    juegoIniciado = true;
    document.getElementById('pantalla-inicio').style.display = 'none';
});

socket.on('actualizar_zona', d => { zona = d.zona; });

// LÓGICA DE MOVIMIENTO HÍBRIDA
function handleInput() {
    let dx = 0, dy = 0;
    // Teclado
    if(teclas['ArrowUp']) dy = -1; if(teclas['ArrowDown']) dy = 1;
    if(teclas['ArrowLeft']) dx = -1; if(teclas['ArrowRight']) dx = 1;
    if(teclas['Space']) { player.speed = 15; setTimeout(()=>player.speed=6, 200); }
    
    // Joystick
    if(joyX !== 0 || joyY !== 0) { dx = joyX; dy = joyY; }

    if(dx !== 0 || dy !== 0) {
        player.x += dx * player.speed; player.y += dy * player.speed;
        player.angle = Math.atan2(dy, dx);
        player.anim += 0.2;
        player.stretch = 1 + Math.abs(Math.sin(player.anim)) * 0.4;
    } else { player.stretch = 1; }

    // Verificar Zona
    const distZona = Math.hypot(player.x - zona.x, player.y - zona.y);
    if(distZona > zona.radio && player.vivo) {
        if(!fueraInterval) {
            tiempoFuera = 5;
            document.getElementById('aviso-zona').style.display = 'block';
            fueraInterval = setInterval(() => {
                tiempoFuera--;
                document.getElementById('timer-zona').innerText = tiempoFuera;
                if(tiempoFuera <= 0) {
                    socket.emit('eliminar_jugador', socket.id);
                    clearInterval(fueraInterval);
                }
            }, 1000);
        }
    } else {
        clearInterval(fueraInterval); fueraInterval = null;
        document.getElementById('aviso-zona').style.display = 'none';
    }
}
    
// JOYSTICK TÁCTIL
const jBase = document.getElementById('joy-base');
const jStick = document.getElementById('joy-stick');
jBase.ontouchmove = e => {
    const t = e.touches[0], r = jBase.getBoundingClientRect();
    let dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
    const d = Math.hypot(dx, dy); if(d > 45) { dx *= 45/d; dy *= 45/d; }
    jStick.style.transform = `translate(${dx}px, ${dy}px)`;
    joyX = dx/45; joyY = dy/45;
};
jBase.ontouchend = () => { jStick.style.transform = 'translate(0,0)'; joyX = 0; joyY = 0; };
document.getElementById('btn-dash').ontouchstart = () => { player.speed = 18; setTimeout(()=>player.speed=6, 200); };

function draw() {
    if(juegoIniciado) handleInput();
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.clearRect(0,0, canvas.width, canvas.height);
    if(!juegoIniciado) { requestAnimationFrame(draw); return; }

    ctx.save();
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

    // Dibujar Zona
    ctx.strokeStyle = "red"; ctx.lineWidth = 10;
    ctx.beginPath(); ctx.arc(zona.x, zona.y, zona.radio, 0, Math.PI*2); ctx.stroke();

    // Dibujar Muros
    ctx.fillStyle = "#333";
    walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

    // Dibujar Items
    ctx.fillStyle = "red";
    items.forEach(it => ctx.fillRect(it.x, it.y, 20, 20));

    // Otros Jugadores
    for(let id in players) {
        let p = players[id];
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
        ctx.fillStyle = "#555";
        ctx.beginPath(); ctx.ellipse(0, 0, 15*(p.stretch||1), 13, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    // Mi Jugador
    if(player.vivo) {
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
        ctx.fillStyle = "#0f0";
        ctx.beginPath(); ctx.ellipse(0, 0, 15*player.stretch, 13, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        socket.emit('move', { x: player.x, y: player.y, angle: player.angle, stretch: player.stretch });
    }

    ctx.restore();
    requestAnimationFrame(draw);
}
draw();
socket.on('playerMoved', d => players[d.id] = d);
socket.on('playerDisconnected', id => delete players[id]);
socket.on('has_muerto', () => { player.vivo = false; location.reload(); });
</script>
</body>
</html>
