<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - Battle Royale</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; font-family: sans-serif; }
        canvas { display: block; background: #000; margin: auto; }
        
        #pantalla-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .form-container { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid #00ff00; width: 85%; max-width: 320px; text-align: center; display: none; }
        button { width: 100%; padding: 12px; background: #00ff00; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }

        /* JOYSTICK ANDROID */
        #ui-controles { position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; pointer-events: none; display: none; }
        #joystick-area { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #00ff00; border-radius: 50%; pointer-events: none; }
        #btn-dash-touch { position: absolute; bottom: 60px; right: 40px; width: 80px; height: 80px; background: #00ffff; border-radius: 50%; pointer-events: auto; border: none; font-weight: bold; }
        
        .ui-overlay { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h1>SOLO UN PUNTO</h1>
        <div id="menu-opciones" class="form-container" style="display: block;">
            <button onclick="mostrarSeccion('contenedor-login')">LOGIN</button>
        </div>
        <div id="contenedor-login" class="form-container">
            <input type="email" id="login-email" style="width:90%; margin:10px;" placeholder="Correo">
            <input type="password" id="login-pass" style="width:90%; margin:10px;" placeholder="Pass">
            <button onclick="login()">ENTRAR</button>
        </div>
        <div id="contenedor-espera" class="form-container">
            <h3 id="contador-jugadores">1 Jugador</h3>
            <button id="btn-iniciar-host" style="display: none;" onclick="solicitarInicio()">INICIAR</button>
        </div>
    </div>

    <div id="ui-controles">
        <div id="joystick-area"><div id="joystick-stick"></div></div>
        <button id="btn-dash-touch">DASH</button>
    </div>

    <div id="ui-overlay" class="ui-overlay">
        <div id="dash-ui">DASH: 1 / 5</div>
        <div id="arma-ui">ARMA: NO</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
// ASEGÚRATE QUE ESTA URL SEA LA DE TU RENDER
const socket = io("https://server-solo-un-punto.onrender.com");
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const BASE_WIDTH = 1280, BASE_HEIGHT = 720;

let player = { x: 2500, y: 2500, dashes: 1, lastDash: 0, hasWeapon: false, angle: 0, stretch: 1, vivo: true, speed: 6 };
let players = {}, items = [], zona = { x: 2500, y: 2500, radio: 2500 }, juegoIniciado = false;
let keys = {}, joyX = 0, joyY = 0;

const isMobile = /Android|iPhone/i.test(navigator.userAgent);
if(isMobile) document.getElementById('ui-controles').style.display = 'block';

function resize() {
    const scale = Math.min(window.innerWidth / BASE_WIDTH, window.innerHeight / BASE_HEIGHT);
    canvas.width = BASE_WIDTH * scale; canvas.height = BASE_HEIGHT * scale;
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.onresize = resize; resize();

// Joystick
const area = document.getElementById('joystick-area');
const stick = document.getElementById('joystick-stick');
area.ontouchmove = e => {
    const t = e.touches[0]; const r = area.getBoundingClientRect();
    let dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
    const d = Math.hypot(dx, dy); if(d > 40) { dx *= 40/d; dy *= 40/d; }
    stick.style.transform = `translate(${dx}px, ${dy}px)`;
    joyX = dx/40; joyY = dy/40;
};
area.ontouchend = () => { stick.style.transform = `translate(0,0)`; joyX = 0; joyY = 0; };
document.getElementById('btn-dash-touch').ontouchstart = activarDash;

function mostrarSeccion(id) {
    document.querySelectorAll('.form-container').forEach(d => d.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function login() { socket.emit('login_usuario', { email: document.getElementById('login-email').value, password: document.getElementById('login-pass').value }); }
socket.on('login_resultado', d => { if(d.exito) mostrarSeccion('contenedor-espera'); });
socket.on('actualizar_sala', d => {
    document.getElementById('contador-jugadores').innerText = d.total + " Jugadores";
    if(socket.id === d.hostId && d.total >= 1) document.getElementById('btn-iniciar-host').style.display = 'block';
});

function solicitarInicio() { socket.emit('solicitar_inicio_partida'); }
socket.on('iniciar_partida', d => { items = d.items; zona = d.zona; juegoIniciado = true; document.getElementById('pantalla-inicio').style.display = 'none'; document.getElementById('ui-overlay').style.display = 'block'; });

function activarDash() {
    if(player.dashes > 0) { player.dashes--; player.lastDash = Date.now(); player.speed = 18; setTimeout(() => player.speed = 6, 250); }
}

window.onkeydown = e => { keys[e.key] = true; if(e.key === ' ') activarDash(); };
window.onkeyup = e => keys[e.key] = false;

function update() {
    if(!juegoIniciado || !player.vivo) return;
    
    let mx = joyX, my = joyY;
    if(keys['w'] || keys['ArrowUp']) my = -1;
    if(keys['s'] || keys['ArrowDown']) my = 1;
    if(keys['a'] || keys['ArrowLeft']) mx = -1;
    if(keys['d'] || keys['ArrowRight']) mx = 1;

    if(mx !== 0 || my !== 0) {
        player.x += mx * player.speed; player.y += my * player.speed;
        player.angle = Math.atan2(my, mx); player.stretch = 1.4;
    } else { player.stretch = 1; }

    if(player.dashes === 0 && Date.now() - player.lastDash > 6000) player.dashes = 1;

    items.forEach(it => {
        if(Math.hypot(player.x - it.x, player.y - it.y) < 30) {
            if(it.type === 'weapon') player.hasWeapon = true;
            if(it.type === 'dash') player.dashes = 5;
            socket.emit('item_recogido', it.id);
        }
    });

    for(let id in players) {
        if(player.hasWeapon && Math.hypot(player.x - players[id].x, player.y - players[id].y) < 40) {
            socket.emit('eliminar_jugador', id);
        }
    }
    socket.emit('move', { x: player.x, y: player.y, angle: player.angle, stretch: player.stretch, hasWeapon: player.hasWeapon });
}

socket.on('item_eliminado', id => items = items.filter(it => it.id !== id));
socket.on('playerMoved', d => players[d.id] = d);
socket.on('playerDisconnected', id => delete players[id]);
socket.on('actualizar_zona', nZ => zona = nZ);
socket.on('has_muerto', () => { player.vivo = false; alert("ELIMINADO"); location.reload(); });

function draw() {
    update();
    ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
    if(!juegoIniciado) { requestAnimationFrame(draw); return; }

    ctx.save();
    ctx.translate(BASE_WIDTH/2, BASE_HEIGHT/2);
    ctx.scale(isMobile ? 0.45 : 0.7, isMobile ? 0.45 : 0.7); // Zoom más alejado en móvil
    ctx.translate(-player.x, -player.y);

    // Zona
    ctx.strokeStyle = "red"; ctx.lineWidth = 15;
    ctx.beginPath(); ctx.arc(zona.x, zona.y, zona.radio, 0, Math.PI*2); ctx.stroke();

    // Items
    items.forEach(it => {
        ctx.fillStyle = it.type === 'weapon' ? 'red' : 'cyan';
        ctx.fillRect(it.x-12, it.y-12, 24, 24);
    });

    // Otros
    for(let id in players) {
        let p = players[id];
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
        ctx.fillStyle = "#555";
        ctx.beginPath(); ctx.ellipse(0, 0, 15*p.stretch, 13, 0, 0, Math.PI*2); ctx.fill();
        if(p.hasWeapon) { ctx.fillStyle = "red"; ctx.fillRect(15, -6, 25, 12); }
        ctx.restore();
    }

    // Mi Punto
    ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
    ctx.fillStyle = player.hasWeapon ? "cyan" : "lime";
    ctx.beginPath(); ctx.ellipse(0, 0, 15*player.stretch, 13, 0, 0, Math.PI*2); ctx.fill();
    if(player.hasWeapon) { ctx.fillStyle = "red"; ctx.fillRect(15, -6, 25, 12); }
    ctx.restore();

    ctx.restore();
    document.getElementById('dash-ui').innerText = `DASH: ${player.dashes} / 5`;
    document.getElementById('arma-ui').innerText = `ARMA: ${player.hasWeapon ? 'SÍ' : 'NO'}`;
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
