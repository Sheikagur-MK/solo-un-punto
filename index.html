<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - Pro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
        canvas { display: block; }
        
        /* PANTALLA DE INICIO / LOGIN */
        #pantalla-inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
        }

           .form-container {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background: #333;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00ff00;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        button:hover { background: #00cc00; }

        #mensaje-servidor { font-size: 0.8em; margin-top: 10px; min-height: 1em; }

        /* UI DEL JUEGO */
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            font-family: 'Courier New', Courier, monospace; pointer-events: none; 
            text-shadow: 2px 2px 2px #000;
            display: none; 
        }
        .timer { color: #ffcc00; font-size: 1.2em; }
        #dashCount { color: #00ffff; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h1>SOLO UN PUNTO</h1>
        <div class="form-container">
            <h3>Registro de Jugador</h3>
            <input type="text" id="reg-user" placeholder="Nombre de usuario">
            <input type="email" id="reg-email" placeholder="Correo electrónico">
            <input type="password" id="reg-pass" placeholder="Contraseña">
            <button onclick="registrar()">Registrarse</button>
            <p id="mensaje-servidor"></p>
        </div>
    </div>

    <div id="ui">
        <h2 id="status">BUSCA UN RECTÁNGULO</h2>
        <div id="faseInfo">FASE: 1</div>
        <div id="timer" class="timer">Zona: 03:00</div>
        <div id="dashCount"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
// --- CONFIGURACIÓN DE RED ---
// ¡IMPORTANTE! Reemplaza la URL de abajo por tu link azul de Render
const socket = io("https://server-solo-un-punto.onrender.com"); 

let juegoIniciado = false; 

// --- REGISTRO CON MONGODB ---
function registrar() {
    const user = document.getElementById('reg-user').value;
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-pass').value;
    const mensaje = document.getElementById('mensaje-servidor');

    if(!user || !email || !pass) {
        mensaje.innerText = "⚠️ Por favor llena todos los campos";
        mensaje.style.color = "yellow";
        return;
    }

    mensaje.innerText = "⏳ Conectando con el servidor...";
    mensaje.style.color = "white";

    // Enviamos los datos al servidor corregido
    socket.emit('registrar_usuario', {
        username: user,
        email: email,
        password: pass
    });
}

// Escuchamos la respuesta del servidor
socket.on('registro_resultado', (data) => {
    const mensaje = document.getElementById('mensaje-servidor');
    if (data.exito) {
        alert("✅ " + data.mensaje);
        document.getElementById('pantalla-inicio').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        juegoIniciado = true;
        spawnPlayerSafely(); // Reiniciamos posición al entrar
    } else {
        mensaje.innerText = "❌ " + data.mensaje;
        mensaje.style.color = "red";
    }
});

// --- LÓGICA DEL JUEGO ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let players = {};
socket.on('state', (serverPlayers) => { players = serverPlayers; });

const WORLD_SIZE = 5000; 
let gameOver = false;

const player = {
    x: WORLD_SIZE / 2,
    y: WORLD_SIZE / 2,
    radius: 12,
    speed: 5,
    angle: 0,
    isMoving: false
};

// --- MUROS ---
let walls = [];
for(let i=0; i<100; i++) {
    let wx = Math.random() * (WORLD_SIZE - 400) + 200;
    let wy = Math.random() * (WORLD_SIZE - 400) + 200;
    walls.push({x: wx, y: wy, w: 300, h: 25});
}

function checkWallCollision(px, py) {
    for (let wall of walls) {
        if (px + player.radius > wall.x && px - player.radius < wall.x + wall.w &&
            py + player.radius > wall.y && py - player.radius < wall.y + wall.h) return true;
    }
    return false;
}

function spawnPlayerSafely() {
    let safe = false;
    while (!safe) {
        player.x = Math.random() * (WORLD_SIZE - 1000) + 500;
        player.y = Math.random() * (WORLD_SIZE - 1000) + 500;
        if (!checkWallCollision(player.x, player.y)) safe = true;
    }
}

// --- CONTROLES BÁSICOS (MOUSE/TOUCH) ---
let targetPos = { x: player.x, y: player.y };

canvas.addEventListener('mousedown', (e) => {
    if(!juegoIniciado) return;
    updateTarget(e.clientX, e.clientY);
});

function updateTarget(screenX, screenY) {
    // Convertir clic de pantalla a coordenadas del mundo
    targetPos.x = player.x + (screenX - canvas.width/2) / 0.6;
    targetPos.y = player.y + (screenY - canvas.height/2) / 0.6;
}

function update() {
    if (gameOver || !juegoIniciado) return;
    
    let dx = targetPos.x - player.x;
    let dy = targetPos.y - player.y;
    let dist = Math.hypot(dx, dy);

    if (dist > 5) {
        let vx = (dx / dist) * player.speed;
        let vy = (dy / dist) * player.speed;
        
        if (!checkWallCollision(player.x + vx, player.y)) player.x += vx;
        if (!checkWallCollision(player.x, player.y + vy)) player.y += vy;
        
        player.angle = Math.atan2(vy, vx);
        
        // Enviar movimiento al servidor
        socket.emit('move', { x: player.x, y: player.y, angle: player.angle });
    }
}

function draw() {
    if (!juegoIniciado) {
        requestAnimationFrame(draw);
        return; 
    }

    update();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2); 
    ctx.scale(0.6, 0.6); 
    ctx.translate(-player.x, -player.y); 

    // Dibujar Muros
    ctx.fillStyle = "#444";
    walls.forEach(w => { ctx.fillRect(w.x, w.y, w.w, w.h); });

    // Dibujar otros jugadores
    for (let id in players) {
        if (id !== socket.id) {
            let p = players[id];
            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2); ctx.fill();
        }
    }

    // Dibujar mi Jugador
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2);
    ctx.fillStyle = "#00ff00";
    ctx.fill();
    // Ojo para ver dirección
    ctx.fillStyle = "white"; ctx.fillRect(8, -2, 6, 4);
    ctx.restore();
    
    ctx.restore();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
