<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - Pro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            font-family: 'Courier New', Courier, monospace; pointer-events: none; 
            text-shadow: 2px 2px 2px #000;
        }
        .timer { color: #ffcc00; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="status">BUSCA UN RECTÁNGULO</h2>
        <div id="faseInfo">FASE: 1</div>
        <div id="timer" class="timer">Zona: 03:00</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <script src="game.js"></script>
</body>
</html>
