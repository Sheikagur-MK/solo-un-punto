<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo un Punto - Pro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
        canvas { display: block; }

        /* CONTENEDOR PRINCIPAL DE UI */
        #pantalla-inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
        }
        
        .form-container {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            width: 80%;
            max-width: 320px;
            text-align: center;
            display: none; /* Se controlan por JS */
        }

        /* TÍTULOS Y BOTONES */
        .titulo-game {
            font-size: 3em;
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00;
            margin-bottom: 30px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background: #333;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        button.secundario {
            background: #444;
            color: white;
            margin-top: 15px;
        }

        button:hover { opacity: 0.8; }

        .mensaje { font-size: 0.85em; margin-top: 10px; min-height: 1.2em; }
        
        /* UI DEL JUEGO */
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            font-family: 'Courier New', Courier, monospace; pointer-events: none; 
            text-shadow: 2px 2px 2px #000; display: none; 
        }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h1 class="titulo-game">SOLO UN PUNTO</h1>

        <div id="menu-opciones" class="form-container" style="display: block; border: none;">
            <button onclick="mostrarSeccion('contenedor-login')">INICIAR SESIÓN</button>
            <button onclick="mostrarSeccion('contenedor-registro')" class="secundario">REGISTRARSE</button>
        </div>

        <div id="contenedor-login" class="form-container">
            <h3>Login</h3>
            <input type="email" id="login-email" placeholder="Correo electrónico">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
            <button class="secundario" onclick="mostrarSeccion('menu-opciones')">Volver</button>
            <p id="msg-login" class="mensaje"></p>
        </div>

        <div id="contenedor-registro" class="form-container">
            <h3>Nuevo Guerrero</h3>
            <input type="text" id="reg-user" placeholder="Nombre de usuario">
            <input type="email" id="reg-email" placeholder="Correo electrónico">
            <input type="password" id="reg-pass" placeholder="Contraseña">
            <button onclick="registrar()">Crear Cuenta</button>
            <button class="secundario" onclick="mostrarSeccion('menu-opciones')">Volver</button>
            <p id="msg-reg" class="mensaje"></p>
        </div>
    </div>
    <div id="contenedor-espera" class="form-container">
    <h3 id="rol-usuario">SALA DE ESPERA</h3>
    <p style="font-size: 2.5em; color: #ffcc00;" id="contador-jugadores">1 / 100</p>
    <p id="msg-espera" style="font-size: 0.8em; color: #888;">Esperando jugadores...</p>
    <button id="btn-iniciar-host" style="display: none; background: #ffcc00;" onclick="solicitarInicio()">INICIAR PARTIDA</button>
</div>

    <div id="ui">
        <h2 id="status">BUSCA UN RECTÁNGULO</h2>
        <div id="timer" class="timer">Zona: 03:00</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
// --- CONFIGURACIÓN DE RED (RENDER) ---
const socket = io("https://server-solo-un-punto.onrender.com"); 

let juegoIniciado = false;

// --- NAVEGACIÓN DE MENÚS ---
function mostrarSeccion(id) {
    document.querySelectorAll('.form-container').forEach(div => div.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

// --- LÓGICA DE REGISTRO ---
function registrar() {
    const user = document.getElementById('reg-user').value;
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-pass').value;
    const msg = document.getElementById('msg-reg');

    if(!user || !email || !pass) {
        msg.innerText = "⚠️ Completa todos los campos";
        msg.style.color = "yellow";
        return;
    }

    socket.emit('registrar_usuario', { username: user, email: email, password: pass });
}

socket.on('registro_resultado', (data) => {
    const msg = document.getElementById('msg-reg');
    if (data.exito) {
        alert("✅ Registro exitoso. Ahora inicia sesión.");
        // Limpiar campos y volver al menú principal
        document.getElementById('reg-user').value = "";
        document.getElementById('reg-email').value = "";
        document.getElementById('reg-pass').value = "";
        mostrarSeccion('menu-opciones');
    } else {
        msg.innerText = "❌ " + data.mensaje;
        msg.style.color = "red";
    }
});

// --- LÓGICA DE LOGIN ---
function login() {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    const msg = document.getElementById('msg-login');

    if(!email || !pass) {
        msg.innerText = "⚠️ Ingresa tus credenciales";
        msg.style.color = "yellow";
        return;
    }

    // Emitimos evento de login (asegúrate que tu servidor en Render escuche 'login_usuario')
    socket.emit('login_usuario', { email: email, password: pass });
}

socket.on('login_resultado', (data) => {
    const msg = document.getElementById('msg-login');
    if (data.exito) {
        document.getElementById('pantalla-inicio').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        juegoIniciado = true;
        spawnPlayerSafely();
    } else {
        msg.innerText = "❌ " + data.mensaje;
        msg.style.color = "red";
    }
});
// --- NUEVAS FUNCIONES DE SALA ---

// Mostrar la sección de espera tras login exitoso
socket.on('login_resultado', (data) => {
    const msg = document.getElementById('msg-login');
    if (data.exito) {
        mostrarSeccion('contenedor-espera');
    } else {
        msg.innerText = "❌ " + data.mensaje;
        msg.style.color = "red";
    }
});

// Actualizar el estado del Lobby
socket.on('actualizar_sala', (data) => {
    document.getElementById('contador-jugadores').innerText = `${data.total} / 100`;
    
    if (socket.id === data.hostId) {
        document.getElementById('rol-usuario').innerText = "ERES EL ANFITRIÓN";
        document.getElementById('rol-usuario').style.color = "#00ffff";
        
        // El botón solo aparece si hay 2 o más
        if (data.total >= 2) {
            document.getElementById('btn-iniciar-host').style.display = 'block';
            document.getElementById('msg-espera').innerText = "¡Puedes iniciar cuando quieras!";
        } else {
            document.getElementById('btn-iniciar-host').style.display = 'none';
            document.getElementById('msg-espera').innerText = "Falta al menos 1 jugador más.";
        }
    } else {
        document.getElementById('rol-usuario').innerText = "SALA DE ESPERA";
        document.getElementById('msg-espera').innerText = "Esperando al anfitrión...";
    }
});

function solicitarInicio() {
    socket.emit('solicitar_inicio_partida');
}

socket.on('iniciar_partida', () => {
    document.getElementById('pantalla-inicio').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    juegoIniciado = true;
    spawnPlayerSafely();
});
// --- LÓGICA DEL JUEGO ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let players = {};
socket.on('state', (serverPlayers) => { players = serverPlayers; });

const WORLD_SIZE = 5000; 
let gameOver = false;

const player = {
    x: WORLD_SIZE / 2,
    y: WORLD_SIZE / 2,
    radius: 12,
    speed: 5,
    angle: 0,
    isMoving: false
};

// --- MUROS ---
let walls = [];
for(let i=0; i<100; i++) {
    let wx = Math.random() * (WORLD_SIZE - 400) + 200;
    let wy = Math.random() * (WORLD_SIZE - 400) + 200;
    walls.push({x: wx, y: wy, w: 300, h: 25});
}

function checkWallCollision(px, py) {
    for (let wall of walls) {
        if (px + player.radius > wall.x && px - player.radius < wall.x + wall.w &&
            py + player.radius > wall.y && py - player.radius < wall.y + wall.h) return true;
    }
    return false;
}

function spawnPlayerSafely() {
    let safe = false;
    while (!safe) {
        player.x = Math.random() * (WORLD_SIZE - 1000) + 500;
        player.y = Math.random() * (WORLD_SIZE - 1000) + 500;
        if (!checkWallCollision(player.x, player.y)) safe = true;
    }
}

// --- CONTROLES BÁSICOS (MOUSE/TOUCH) ---
let targetPos = { x: player.x, y: player.y };

canvas.addEventListener('mousedown', (e) => {
    if(!juegoIniciado) return;
    updateTarget(e.clientX, e.clientY);
});

function updateTarget(screenX, screenY) {
    // Convertir clic de pantalla a coordenadas del mundo
    targetPos.x = player.x + (screenX - canvas.width/2) / 0.6;
    targetPos.y = player.y + (screenY - canvas.height/2) / 0.6;
}

function update() {
    if (gameOver || !juegoIniciado) return;
    
    let dx = targetPos.x - player.x;
    let dy = targetPos.y - player.y;
    let dist = Math.hypot(dx, dy);

    if (dist > 5) {
        let vx = (dx / dist) * player.speed;
        let vy = (dy / dist) * player.speed;
        
        if (!checkWallCollision(player.x + vx, player.y)) player.x += vx;
        if (!checkWallCollision(player.x, player.y + vy)) player.y += vy;
        
        player.angle = Math.atan2(vy, vx);
        
        // Enviar movimiento al servidor
        socket.emit('move', { x: player.x, y: player.y, angle: player.angle });
    }
}

function draw() {
    if (!juegoIniciado) {
        requestAnimationFrame(draw);
        return; 
    }

    update();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2); 
    ctx.scale(0.6, 0.6); 
    ctx.translate(-player.x, -player.y); 

    // Dibujar Muros
    ctx.fillStyle = "#444";
    walls.forEach(w => { ctx.fillRect(w.x, w.y, w.w, w.h); });

    // Dibujar otros jugadores
    for (let id in players) {
        if (id !== socket.id) {
            let p = players[id];
            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2); ctx.fill();
        }
    }

    // Dibujar mi Jugador
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2);
    ctx.fillStyle = "#00ff00";
    ctx.fill();
    // Ojo para ver dirección
    ctx.fillStyle = "white"; ctx.fillRect(8, -2, 6, 4);
    ctx.restore();
    
    ctx.restore();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
